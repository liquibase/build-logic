name: 'Liquibase Checkout'
description: 'Org-standard checkout — SHA managed centrally in build-logic'
inputs:
  repository:
    description: 'Repository name with owner'
    required: false
    default: ${{ github.repository }}
  ref:
    description: 'The branch, tag or SHA to checkout'
    required: false
    default: ''
  token:
    description: 'Personal access token for the checkout'
    required: false
    default: ${{ github.token }}
  fetch-depth:
    description: 'Number of commits to fetch. 0 indicates all history for all branches and tags'
    required: false
    default: '1'
  persist-credentials:
    description: 'Whether to persist credentials for subsequent steps'
    required: false
    default: 'true'
  submodules:
    description: 'Whether to checkout submodules'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        token: ${{ inputs.token }}
        fetch-depth: ${{ inputs.fetch-depth }}
        persist-credentials: ${{ inputs.persist-credentials }}
        submodules: ${{ inputs.submodules }}
