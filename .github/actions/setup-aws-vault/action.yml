name: 'Setup AWS Vault'
description: 'Configure AWS credentials and retrieve secrets from vault'
outputs:
  vault-secrets:
    description: 'All vault secrets as environment variables'
    value: ${{ steps.vault-secrets.outputs.vault-secrets }}
runs:
  using: 'composite'
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
        aws-region: us-east-1

    - name: Get secrets from vault
      id: vault-secrets
      uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
      with:
        secret-ids: |
          ,/vault/liquibase
        parse-json-secrets: true