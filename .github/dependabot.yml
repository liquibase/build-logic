# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "liquibase/liquibase-devops"
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
    # Also scan composite action directories for SHA updates
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/checkout"
    schedule:
      interval: "weekly"
    reviewers:
      - "liquibase/liquibase-devops"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/setup-java"
    schedule:
      interval: "weekly"
    reviewers:
      - "liquibase/liquibase-devops"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/configure-aws-credentials"
    schedule:
      interval: "weekly"
    reviewers:
      - "liquibase/liquibase-devops"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/setup-aws-vault"
    schedule:
      interval: "weekly"
    reviewers:
      - "liquibase/liquibase-devops"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/setup-google-credentials"
    schedule:
      interval: "weekly"
    reviewers:
      - "liquibase/liquibase-devops"
    commit-message:
      prefix: "chore(deps)"
