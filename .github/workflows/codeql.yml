# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
# TODO: Add support for handling multiple languages in the CodeQL workflow

name: "CodeQL"

on:
  workflow_call:
    inputs:
      languages:
        description: 'Languages to analyze'
        required: false
        default: '["java"]'
        type: string
      buildCommand:
        description: 'Custom build command'
        required: false
        default: ''
        type: string
      javaBuildVersion:
        description: "Java version to build the project"
        required: false
        default: "21"
        type: string
      codeqlConfigFile:
        description: "Path to CodeQL configuration file (e.g., .github/codeql/codeql-config.yml) for customizing queries and exclusions"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  security-events: write
  packages: read
  id-token: write

jobs:
  analyze:
    name: Analyze
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}

    strategy:
      fail-fast: false
      matrix:
        language: ${{fromJson(inputs.languages)}}

        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby', 'swift' ]
        # Use only 'java' to analyze code written in Java, Kotlin or both
        # Use only 'javascript' to analyze code written in JavaScript, TypeScript or both
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Configure AWS credentials for vault access
      if: matrix.language == 'java'
      uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
      with:
        role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
        aws-region: us-east-1

    - name: Get secrets from vault
      if: matrix.language == 'java'
      id: vault-secrets
      uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
      with:
        secret-ids: |
          ,/vault/liquibase
        parse-json-secrets: true

    # setting a build mode based on whether a buildCommand is provided or not.
    # If a buildCommand is provided, it sets the build mode to "manual"; otherwise, it sets it to "autobuild".
    - name: set build mode
      id: set-build-mode
      env:
        BUILD_COMMAND: ${{ inputs.buildCommand }}
      run: |
        if [[ -n "${BUILD_COMMAND}" ]]
        then
          echo "Build command is provided. Setting buildMode to manual"
          buildMode='manual'
        else
            echo "Build command is not provided. Setting buildMode to autobuild"
            buildMode='autobuild'
        fi
        echo "buildMode=$buildMode" >> $GITHUB_OUTPUT

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ steps.set-build-mode.outputs.buildMode }}
        config-file: ${{ inputs.codeqlConfigFile || '' }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        queries: security-extended,security-and-quality

    - name: Setup JDK
      if: matrix.language == 'java'
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: ${{ inputs.javaBuildVersion }}
        distribution: 'temurin'
        cache: 'maven'
        

    - name: Set up Maven
      if: matrix.language == 'java'
      uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
      with:
        maven-version: "3.9.5"
    # look for dependencies in maven
    - name: Set up Maven settings.xml
      if: matrix.language == 'java'
      uses: liquibase/build-logic/.github/actions/setup-maven-settings@f93330000066bdb988a1360a66e9278b2201dbb7 # main
      with:
        gpm-token: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}

    # users can specify the custom build command via the buildCommand input.
    # If no custom command is provided, it will be 'autobuild' by codeql in step set-build-mode  .

    - name: Build
      if: steps.set-build-mode.outputs.buildMode  == 'manual'
      env:
        BUILD_COMMAND: ${{ inputs.buildCommand }}
      run: |
        ${BUILD_COMMAND}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        category: "/language:${{matrix.language}}"
