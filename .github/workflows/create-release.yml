name: Create Release

on:
  workflow_call:
    inputs:
      artifactPath:
        description: "Specify the path to the artifacts that should be attached to the build. Useful for multi-module extensions."
        required: false
        default: "."
        type: string
      sonar:
        description: "Specify it if you want to run sonar scan"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: read
  issues: read
  statuses: read
  actions: read
  security-events: write
  id-token: write # Required by AWS OIDC authentication in sonar

jobs:
  sonar:
    if: ${{ inputs.sonar == true }}
    uses: liquibase/build-logic/.github/workflows/sonar-scan.yml@main
    secrets: inherit

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    # Serialize release-drafter runs per-repo to prevent concurrent runs from
    # creating duplicate draft releases (https://github.com/release-drafter/release-drafter/issues/1146)
    concurrency:
      group: create-release-draft-${{ github.repository }}
      cancel-in-progress: true
    steps:
      - name: Create Release Draft
        id: create-release
        uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Clean up stale draft releases, keeping only the most recent one.
      # Sequential pushes to main (dependabot merges, PRs, version bumps) cause
      # release-drafter to accumulate duplicate drafts over time (DAT-22607).
      # https://github.com/release-drafter/release-drafter/issues/1081
      - name: Delete stale draft releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEWEST_DRAFT_ID: ${{ steps.create-release.outputs.id }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "INFO: Checking for stale draft releases..."
          STALE_DRAFT_IDS=$(gh api --paginate "repos/${GH_REPO}/releases" \
            --jq "[.[] | select(.draft == true and .id != ${NEWEST_DRAFT_ID})] | .[].id")
          if [ -n "$STALE_DRAFT_IDS" ]; then
            echo "$STALE_DRAFT_IDS" | while read -r id; do
              [ -z "$id" ] && continue
              echo "INFO: Deleting stale draft release ID: $id"
              gh api --method DELETE "repos/${GH_REPO}/releases/$id"
            done
            echo "INFO: Stale draft cleanup complete"
          else
            echo "INFO: No stale drafts to clean up"
          fi
