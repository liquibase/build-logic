# Terraform Action to lint and apply updated redirects
name: Ephemeral Cloud Infrastructure
on:
  workflow_call:
    inputs:
      deploy:
        description: "Deploy the ephemeral cloud infrastructure"
        required: false
        type: boolean
      destroy:
        description: "Destroy the ephemeral cloud infrastructure"
        required: false
        type: boolean
      dynamodb:
        description: "Deploy or destroy the dynamodb infrastructure"
        required: false
        type: boolean
        default: false
      documentdb:
        description: "Deploy or destroy the documentdb infrastructure"
        required: false
        type: boolean
        default: false
      snowflake_oss:
        description: "Deploy or destroy the snowflake OSS infrastructure"
        required: false
        type: boolean
        default: false
      snowflake_pro:
        description: "Deploy or destroy the snowflake PRO infrastructure"
        required: false
        type: boolean
        default: false
      snowflake_th:
        description: "Deploy or destroy the snowflake Test Harness infrastructure"
        required: false
        type: boolean
        default: false
      snowflake_ext:
        description: "Deploy or destroy the snowflake Extension infrastructure"
        required: false
        type: boolean
        default: false
      aws_postgresql:
        description: "Deploy or destroy the aws_postgresql infrastructure"
        required: false
        type: boolean
        default: false
      aws_oracle:
        description: "Deploy or destroy the aws_oracle infrastructure"
        required: false
        type: boolean
        default: false
      aws_mariadb:
        description: "Deploy or destroy the aws_mariadb infrastructure"
        required: false
        type: boolean
        default: false
      aws_aurora_mysql:
        description: "Deploy or destroy the aws_aurora_mysql infrastructure"
        required: false
        type: boolean
        default: false
      aws_mssql:
        description: "Deploy or destroy the aws_mssql infrastructure"
        required: false
        type: boolean
        default: false
      aws_aurora_postgres:
        description: "Deploy or destroy the aws_aurora_postgres infrastructure"
        required: false
        type: boolean
        default: false
      aws_mysql:
        description: "Deploy or destroy the aws_mysql infrastructure"
        required: false
        type: boolean
        default: false
      aws_redshift:
        description: "Deploy or destroy the aws_redshift infrastructure"
        required: false
        type: boolean
        default: false
      stack_id:
        description: "The stack ID to destroy"
        required: false
        type: string
    outputs:
      stack_id:
        description: "The stack ID of the ephemeral cloud infrastructure"
        value: ${{ jobs.ephemeral-cloud-infra.outputs.stack_id }}
      resources_id:
        description: "The resources ID of the ephemeral cloud infrastructure"
        value: ${{ jobs.ephemeral-cloud-infra.outputs.resources_id }}

permissions:
  contents: read
  id-token: write

jobs:
  ephemeral-cloud-infra:
    name: ${{ inputs.action}} Ephemeral Cloud Infrastructure
    runs-on: ubuntu-latest
    env:
      GH_RUN_ID: ${{ github.run_id }}
      GH_REPOSITORY: ${{ github.repository }}
    outputs:
      stack_id: ${{ steps.set_stack_id.outputs.stack_id }} # Used to reference the stack created in the ephemeral infra
      resources_id: ${{ steps.create_infra.outputs.resources_id }} # Used to reference the resources created in the ephemeral infra
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read

      - name: Checkout liquibase-infrastructure
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          repository: liquibase/liquibase-infrastructure
          token: ${{ steps.get-token.outputs.token }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.AWS_DEV_GITHUB_OIDC_ROLE_ARN_BUILD_LOGIC }}
          aws-region: us-east-1

      - name: Install spacectl
        uses: spacelift-io/setup-spacectl@8c1f751eb49902d22ab59c9d41211a9d5fa84499 # v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPACELIFT_API_KEY_ENDPOINT: ${{ env.SPACELIFT_API_KEY_ENDPOINT }}
          SPACELIFT_API_KEY_ID: ${{ env.SPACELIFT_API_KEY_ID }}
          SPACELIFT_API_KEY_SECRET: ${{ env.SPACELIFT_API_KEY_SECRET }}

      - name: Terraform Init
        working-directory: test-automation-ephemeral/stack
        id: init
        run: terraform init

      - name: Create ephemeral stack
        id: create_stack
        if: ${{ inputs.deploy }}
        working-directory: test-automation-ephemeral/stack
        run: |
          terraform apply -auto-approve -var "run_id=$GH_RUN_ID" -var "run_repo=$GH_REPOSITORY"
          echo "EPHEMERAL_STACK_ID=$(terraform output -raw ephemeral_stack_id)" >> $GITHUB_ENV
          echo "stack_id=$(terraform output -raw ephemeral_stack_id)" >> "$GITHUB_OUTPUT"

      - name: Set stack ID output
        id: set_stack_id
        if: ${{ inputs.deploy }}
        env:
          CREATE_STACK_ID: ${{ steps.create_stack.outputs.stack_id }}
        run: |
          echo "Ephemeral stack created with ID: $CREATE_STACK_ID"
          echo "stack_id=$CREATE_STACK_ID" >> "$GITHUB_OUTPUT"

      - name: Upload Terraform state as artifact
        if: ${{ inputs.deploy && always()}}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-state
          path: test-automation-ephemeral/stack/terraform.tfstate

      - name: Create ephemeral infra
        id: create_infra
        working-directory: test-automation-ephemeral/infra
        if: ${{ inputs.deploy }}
        env:
          SPACELIFT_API_KEY_ENDPOINT: ${{ env.SPACELIFT_API_KEY_ENDPOINT }}
          SPACELIFT_API_KEY_ID: ${{ env.SPACELIFT_API_KEY_ID }}
          SPACELIFT_API_KEY_SECRET: ${{ env.SPACELIFT_API_KEY_SECRET }}
          STACK_ID: ${{ steps.create_stack.outputs.stack_id }}
          INPUT_DYNAMODB: ${{ inputs.dynamodb }}
          INPUT_DOCUMENTDB: ${{ inputs.documentdb }}
          INPUT_SNOWFLAKE_OSS: ${{ inputs.snowflake_oss }}
          INPUT_SNOWFLAKE_PRO: ${{ inputs.snowflake_pro }}
          INPUT_SNOWFLAKE_TH: ${{ inputs.snowflake_th }}
          INPUT_SNOWFLAKE_EXT: ${{ inputs.snowflake_ext }}
          INPUT_AWS_POSTGRESQL: ${{ inputs.aws_postgresql }}
          INPUT_AWS_ORACLE: ${{ inputs.aws_oracle }}
          INPUT_AWS_MARIADB: ${{ inputs.aws_mariadb }}
          INPUT_AWS_AURORA_MYSQL: ${{ inputs.aws_aurora_mysql }}
          INPUT_AWS_MSSQL: ${{ inputs.aws_mssql }}
          INPUT_AWS_AURORA_POSTGRES: ${{ inputs.aws_aurora_postgres }}
          INPUT_AWS_MYSQL: ${{ inputs.aws_mysql }}
          INPUT_AWS_REDSHIFT: ${{ inputs.aws_redshift }}
        run: |
          ID=$(echo "$STACK_ID" | cut -d '-' -f 5)
          echo "resources_id=$ID" >> "$GITHUB_OUTPUT"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_stack_id $ID
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_dynamodb "$INPUT_DYNAMODB"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_documentdb "$INPUT_DOCUMENTDB"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_snowflake_oss "$INPUT_SNOWFLAKE_OSS"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_snowflake_pro "$INPUT_SNOWFLAKE_PRO"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_snowflake_th "$INPUT_SNOWFLAKE_TH"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_snowflake_ext "$INPUT_SNOWFLAKE_EXT"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_aws_postgresql "$INPUT_AWS_POSTGRESQL"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_aws_oracle "$INPUT_AWS_ORACLE"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_aws_mariadb "$INPUT_AWS_MARIADB"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_aws_aurora_mysql "$INPUT_AWS_AURORA_MYSQL"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_aws_mssql "$INPUT_AWS_MSSQL"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_aws_aurora_postgres "$INPUT_AWS_AURORA_POSTGRES"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_aws_mysql "$INPUT_AWS_MYSQL"
          spacectl stack environment setvar --id $EPHEMERAL_STACK_ID TF_VAR_create_aws_redshift "$INPUT_AWS_REDSHIFT"
          # Taint the LTHDB database resource to force recreation (ignore errors if resource doesn't exist)
          if [[ "$INPUT_SNOWFLAKE_PRO" == "true" || "$INPUT_SNOWFLAKE_TH" == "true" ]]; then
            echo "Tainting LTHDB database resource to ensure clean state..."
            spacectl stack task --id $EPHEMERAL_STACK_ID --command "terraform taint 'snowflake_database.LIQUIBASETH_ORIGINAL[0]'" || echo "Resource doesn't exist or already tainted, continuing..."
          fi
          spacectl stack deploy --id $EPHEMERAL_STACK_ID --auto-confirm

      - name: Destroy ephemeral infra
        id: destroy_infra
        env:
          STACK_ID: ${{ inputs.stack_id }}
          TF_VAR_stack_id: ${{ inputs.stack_id }}
          SPACELIFT_API_KEY_ENDPOINT: ${{ env.SPACELIFT_API_KEY_ENDPOINT }}
          SPACELIFT_API_KEY_ID: ${{ env.SPACELIFT_API_KEY_ID }}
          SPACELIFT_API_KEY_SECRET: ${{ env.SPACELIFT_API_KEY_SECRET }}
        if: ${{ inputs.destroy }}
        working-directory: test-automation-ephemeral/infra
        run: |
          # Retry the infra destroy to absorb transient AWS API throttling and
          # SG dependency-ordering races (a security group can't be deleted
          # until the RDS instance referencing it is fully gone). We intentionally
          # do NOT swallow a final failure (no `|| true`, no continue-on-error):
          # if the AWS resources are not actually destroyed we must let this step
          # fail so the Spacelift stack is kept and its state survives for a
          # retry. Deleting the stack after a failed destroy is what strands the
          # surviving RDS instances as untracked orphans (TECHOPS-523).
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::terraform destroy attempt $i/$attempts"
            if spacectl stack task --id "${STACK_ID}" --tail "terraform destroy -refresh=false -parallelism=10 -auto-approve"; then
              echo "::endgroup::"
              echo "Ephemeral infra destroyed successfully on attempt $i"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::terraform destroy attempt $i/$attempts failed; retrying after backoff"
            sleep 30
          done
          echo "::error::terraform destroy failed after $attempts attempts. Keeping Spacelift stack '${STACK_ID}' so its Terraform state is preserved for a retry. Investigate before the stack is removed to avoid orphaned RDS resources."
          exit 1

      - name: Download Terraform state
        if: ${{ inputs.destroy && always()}}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: terraform-state
          path: test-automation-ephemeral/stack

      - name: Destroy ephemeral stack
        # Only delete the Spacelift stack object when the AWS resource destroy
        # actually succeeded. If the infra destroy failed we keep the stack (and
        # its Terraform state) so the destroy can be retried; deleting it here
        # would strand the surviving RDS resources as orphans (TECHOPS-523).
        if: ${{ inputs.destroy && steps.destroy_infra.outcome == 'success' }}
        working-directory: test-automation-ephemeral/stack
        run: |
          terraform destroy -auto-approve -var "run_id=$GH_RUN_ID" -var "run_repo=$GH_REPOSITORY"

      - name: Notify Slack on teardown failure
        # Alert the team the moment a teardown fails, instead of waiting for
        # GuardDuty to flag the surviving publicly-accessible RDS. The Spacelift
        # stack is kept (state preserved) so the destroy can be retried (TECHOPS-523).
        if: ${{ inputs.destroy && failure() && steps.destroy_infra.outcome == 'failure' }}
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
        env:
          SLACK_WEBHOOK: ${{ env.EPHEMERAL_DANGLING_RESOURCES_SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: "Ephemeral teardown failed — possible orphaned RDS"
          SLACK_MESSAGE: |
            terraform destroy failed for stack `${{ inputs.stack_id }}` (${{ github.repository }}).
            The Spacelift stack was kept so its state survives for a retry — please investigate and clean up to avoid orphaned, publicly-accessible RDS (TECHOPS-523).
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
