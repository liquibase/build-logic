name: Attach Artifact to Release

# Add permissions for the default GITHUB_TOKEN
permissions:
  contents: write
  actions: read
  packages: write
  id-token: write

on:
  workflow_call:
    inputs:
      zip:
        description: "Specify it if you want to attach a zip file to the release"
        required: false
        default: "false"
        type: string
      mavenProfiles:
        description: "Specify it if you want to run different Maven profiles from the default (coverage).  mavenProfiles example: 'coverage,run-proguard'"
        required: false
        default: ""
        type: string
      os:
        description: "Operating system to build/test on"
        required: false
        default: '["ubuntu-latest", "windows-latest"]'
        type: string
      extraMavenArgs:
        description: "Specify it if you want to run an extra maven argument"
        required: false
        default: ""
        type: string
      artifactPath:
        description: "Specify the path to the artifacts that should be attached to the build. Useful for multi-module extensions."
        required: false
        default: "."
        type: string
      artifactId:
        description: "Specify the artifact ID to be used in the release"
        required: false
        default: ""
        type: string  
      combineJars:
        description: "Specify it if you want to combine jars into one"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Specify it if you want to run a dry run"
        required: false
        default: false
        type: boolean
      dry_run_version:
        description: "The version of the dry-run release"
        required: false
        type: string
      javaBuildVersion:
        description: "Java version to build the project"
        required: false
        default: "21"
        type: string
      liquibaseVersion:
        description: "Liquibase version for release preparation"
        required: false
        default: ""
        type: string
      extraLinuxCommand:
        description: "Specify it if you want to run an extra Linux-specific command before attaching the artifact"
        required: false
        default: ""
        type: string

jobs:
  build-multi-architecture:
    strategy:
      fail-fast: false
      matrix:
        os: ${{fromJson(inputs.os || '["ubuntu-latest"]')}}
    name: Build & Package - ${{ matrix.os }}
    if: ${{ inputs.combineJars }}
    runs-on: ${{ matrix.os }}
    concurrency:
      group: attach-artifact-${{ github.ref }}-${{ matrix.os }}
    outputs:
      artifact_id: ${{ steps.get-artifact-id.outputs.artifact_id }}
      artifact_version: ${{ steps.get-artifact-version.outputs.artifact_version }}
      platform: ${{ steps.normalize-os.outputs.platform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Normalize OS platform name
        id: normalize-os
        uses: liquibase/build-logic/.github/actions/normalize-os@main

      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Set up JDK ${{ inputs.javaBuildVersion }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.javaBuildVersion }}
          distribution: "temurin"
          cache: "maven"

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      # look for dependencies in maven
      - name: Set up Maven settings.xml
        uses: liquibase/build-logic/.github/actions/setup-maven-settings@main
        with:
          gpm-token: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}

      - name: Configure Git
        run: |
          git config user.name "liquibase-workflows[bot]"
          git config user.email "1241802+liquibase-workflows[bot]@users.noreply.github.com"

      - name: Run extra Linux command
        if: inputs.extraLinuxCommand != '' && runner.os == 'Linux'
        shell: bash
        env:
          EXTRA_LINUX_COMMAND: ${{ inputs.extraLinuxCommand }}
        run: |
          # eval is required: callers pass multiline shell scripts (e.g. liquibase-checks, liquibase-aws-extension).
          # Env-var indirection prevents GitHub Actions expression injection; eval handles multi-line interpretation.
          eval "${EXTRA_LINUX_COMMAND}"

      - name: Build and Package
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          MAVEN_PROFILES: ${{ inputs.mavenProfiles }}
          EXTRA_MAVEN_ARGS: ${{ inputs.extraMavenArgs }}
          LIQUIBASE_VERSION: ${{ inputs.liquibaseVersion }}
        run: |
          mvn -B release:clean release:prepare -Darguments="-Dmaven.javadoc.skip=true -Dmaven.test.skipTests=true -Dmaven.test.skip=true -Dmaven.deploy.skip=true" -DcheckModificationExcludeList=** -DignoreSnapshots=true -DreleaseVersion=$LIQUIBASE_VERSION -DpushChanges=false -P "$MAVEN_PROFILES" -DscmServerId=liquibase
          git reset HEAD~ --hard
          mvn -B dependency:go-offline clean package -DskipTests=true ${EXTRA_MAVEN_ARGS} -P "$MAVEN_PROFILES"

      - name: Build and Package (dry-run)
        if: ${{ inputs.dry_run == true }}
        shell: bash
        env:
          MAVEN_PROFILES: ${{ inputs.mavenProfiles }}
          DRY_RUN_VERSION: ${{ inputs.dry_run_version }}
          EXTRA_MAVEN_ARGS: ${{ inputs.extraMavenArgs }}
        run: |
          mvn -B release:clean release:prepare -DdryRun=true -Darguments="-Dmaven.javadoc.skip=true -Dmaven.test.skipTests=true -Dmaven.test.skip=true -Dmaven.deploy.skip=true" -DcheckModificationExcludeList=** -DignoreSnapshots=true -DreleaseVersion=$DRY_RUN_VERSION -DpushChanges=false -P "$MAVEN_PROFILES" -DscmServerId=liquibase
          mvn -B dependency:go-offline clean package -DskipTests=true ${EXTRA_MAVEN_ARGS} -P "$MAVEN_PROFILES"

      - name: Get Artifact ID
        working-directory: ${{ inputs.artifactPath }}
        id: get-artifact-id
        shell: bash
        env:
          ARTIFACT_ID_INPUT: ${{ inputs.artifactId }}
        run: |
          # If artifactId is provided as input, use it; otherwise, evaluate from pom.xml
          if [ -n "${ARTIFACT_ID_INPUT}" ]; then
            artifact_id="${ARTIFACT_ID_INPUT}"
          else
            artifact_id=$(mvn help:evaluate "-Dexpression=project.artifactId" -q -DforceStdout)
          fi
          echo "artifact_id=$artifact_id" >> $GITHUB_OUTPUT

      - name: Get Artifact Version
        working-directory: ${{ inputs.artifactPath }}
        id: get-artifact-version
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          DRY_RUN_VERSION: ${{ inputs.dry_run_version }}
        run: |
          if [ "$DRY_RUN" == "true" ]; then
            artifact_version="$DRY_RUN_VERSION"
          else
            artifact_version=$(mvn help:evaluate "-Dexpression=project.version" -q -DforceStdout)
          fi
          echo "artifact_version=$artifact_version" >> $GITHUB_OUTPUT

      - name: Save Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.get-artifact-id.outputs.artifact_id }}-${{ steps.normalize-os.outputs.platform }}-${{ steps.get-artifact-version.outputs.artifact_version }}-artifacts
          path: |
            ${{ inputs.artifactPath }}/target/*

  combineJars:
    needs: [build-multi-architecture]
    if: ${{ inputs.combineJars }}
    name: Combine Jars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Linux Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{needs.build-multi-architecture.outputs.artifact_id}}-linux-${{needs.build-multi-architecture.outputs.artifact_version}}-artifacts
          path: /tmp/linux
        continue-on-error: true

      - name: Download macOS Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{needs.build-multi-architecture.outputs.artifact_id}}-macos-${{needs.build-multi-architecture.outputs.artifact_version}}-artifacts
          path: /tmp/macos
        continue-on-error: true

      - name: Download Windows Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{needs.build-multi-architecture.outputs.artifact_id}}-windows-${{needs.build-multi-architecture.outputs.artifact_version}}-artifacts
          path: /tmp/windows
        continue-on-error: true

      - name: Create multiplatform jar
        env:
          MULTI_ARTIFACT_ID: ${{needs.build-multi-architecture.outputs.artifact_id}}
          MULTI_ARTIFACT_VERSION: ${{needs.build-multi-architecture.outputs.artifact_version}}
        run: |
          rm -rf /tmp/combined/linux /tmp/combined/windows /tmp/combined/macos
          mkdir -p /tmp/combined/linux /tmp/combined/windows /tmp/combined/macos
          unzip -d /tmp/combined/linux /tmp/linux/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}.jar
          unzip -d /tmp/combined/windows /tmp/windows/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}.jar
          unzip -d /tmp/combined/macos /tmp/macos/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}.jar
          rm -r -f /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}
          mkdir /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}
          cp -a /tmp/combined/linux/* /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}/
          cp -a /tmp/combined/windows/* /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}/
          cp -a /tmp/combined/macos/* /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}/
          rm /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}/org.graalvm.python.vfs/fileslist.txt
          cat /tmp/combined/linux/org.graalvm.python.vfs/fileslist.txt /tmp/combined/windows/org.graalvm.python.vfs/fileslist.txt /tmp/combined/macos/org.graalvm.python.vfs/fileslist.txt > /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}/org.graalvm.python.vfs/fileslist.txt
          rm -f /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}.jar
          cd /tmp/combined/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}/
          zip -r ../${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}.jar *
          cd ..
          cp /tmp/linux/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}-sources.jar /tmp/combined/
          cp /tmp/linux/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}-javadoc.jar /tmp/combined/
          cp /tmp/linux/${MULTI_ARTIFACT_ID}-${MULTI_ARTIFACT_VERSION}.pom /tmp/combined/

      - name: Upload multiplatform artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: multiplatform-artifacts
          path: |
            /tmp/combined/${{needs.build-multi-architecture.outputs.artifact_id}}-${{needs.build-multi-architecture.outputs.artifact_version}}.jar
            /tmp/combined/${{needs.build-multi-architecture.outputs.artifact_id}}-${{needs.build-multi-architecture.outputs.artifact_version}}-sources.jar
            /tmp/combined/${{needs.build-multi-architecture.outputs.artifact_id}}-${{needs.build-multi-architecture.outputs.artifact_version}}-javadoc.jar
            /tmp/combined/${{needs.build-multi-architecture.outputs.artifact_id}}-${{needs.build-multi-architecture.outputs.artifact_version}}.pom

  cleanup-individual-artifacts:
    needs: [build-multi-architecture, combineJars]
    if: ${{ inputs.combineJars && always() }}
    uses: liquibase/build-logic/.github/workflows/cleanup-individual-artifacts.yml@main
    with:
      artifact_id: ${{needs.build-multi-architecture.outputs.artifact_id}}
      artifact_version: ${{needs.build-multi-architecture.outputs.artifact_version}}

  attach-to-release:
    if: ${{ always() && !contains(needs.*.result, 'failure') }}
    name: Attach Artifact to Release
    needs: [build-multi-architecture, combineJars]
    runs-on: ubuntu-latest
    concurrency:
      group: attach-artifact-${{ github.ref }}
    steps:
      - run: sleep 30
        if: ${{ inputs.dry_run == false }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Set up JDK ${{ inputs.javaBuildVersion }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.javaBuildVersion }}
          distribution: "temurin"
          cache: "maven"

      # look for dependencies in maven
      - name: Set up Maven settings.xml
        uses: liquibase/build-logic/.github/actions/setup-maven-settings@main
        with:
          gpm-token: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}

      - name: Get Reusable Script Files
        run: |
          curl -o $PWD/.github/get_draft_release.sh https://raw.githubusercontent.com/liquibase/build-logic/main/.github/get_draft_release.sh
          curl -o $PWD/.github/sign_artifact.sh https://raw.githubusercontent.com/liquibase/build-logic/main/.github/sign_artifact.sh
          curl -o $PWD/.github/upload_asset.sh https://raw.githubusercontent.com/liquibase/build-logic/main/.github/upload_asset.sh
          chmod +x $PWD/.github/get_draft_release.sh
          chmod +x $PWD/.github/sign_artifact.sh
          chmod +x $PWD/.github/upload_asset.sh

      - name: Configure Git
        run: |
          git config user.name "liquibase-workflows[bot]"
          git config user.email "1241802+liquibase-workflows[bot]@users.noreply.github.com"

      - name: Get Artifact ID
        working-directory: ${{ inputs.artifactPath }}
        id: get-artifact-id
        shell: bash
        env:
          ARTIFACT_ID_INPUT: ${{ inputs.artifactId }}
        run: |
          # If artifactId is provided as input, use it; otherwise, evaluate from pom.xml
          if [ -n "${ARTIFACT_ID_INPUT}" ]; then
            artifact_id="${ARTIFACT_ID_INPUT}"
          else
            artifact_id=$(mvn help:evaluate "-Dexpression=project.artifactId" -q -DforceStdout)
          fi
          echo "artifact_id=$artifact_id" >> $GITHUB_ENV

      - name: Get latest draft release ID
        if: ${{ inputs.dry_run == false }}
        id: get-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          RESPONSE=$(curl -sf -X GET -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$GITHUB_REPOSITORY/releases?per_page=100") || {
            echo "::error::Failed to fetch releases from GitHub API"
            exit 1
          }
          LATEST_DRAFT_RELEASE=$(echo "$RESPONSE" | jq -r 'map(select(.draft == true)) | .[0].id // empty')
          echo "Latest Draft Release ID: $LATEST_DRAFT_RELEASE"
          echo "RELEASE_ID=$LATEST_DRAFT_RELEASE" >> $GITHUB_ENV

      - name: Verify draft release exists
        if: ${{ inputs.dry_run == false }}
        run: |
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::No draft release found in the repository. Please create a draft release before running this workflow."
            exit 1
          fi

      - name: Delete existing release assets
        if: ${{ env.RELEASE_ID != '' && env.RELEASE_ID != null && inputs.dry_run == false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          RESPONSE=$(curl -sf -X GET -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets") || {
            echo "::error::Failed to fetch release assets"
            exit 1
          }
          ARTIFACTS=$(echo "$RESPONSE" | jq -r '.[].id')
          if [ -n "$ARTIFACTS" ]; then
            echo "Deleting existing release assets to prevent stale artifacts..."
            for artifact_id in $ARTIFACTS; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/assets/$artifact_id")
              if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
                echo "Deleted artifact ID: $artifact_id"
              else
                echo "::error::Failed to delete artifact ID: $artifact_id (HTTP $HTTP_STATUS)"
                exit 1
              fi
            done
          else
            echo "No existing artifacts to delete"
          fi

      - name: Build release artifacts
        if: ${{ inputs.combineJars == false && inputs.dry_run == false }}
        id: build-release-artifacts
        env:
          RELEASE_VERSION: ${{ inputs.liquibaseVersion }}
          MAVEN_PROFILES: ${{ inputs.mavenProfiles }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # liquibaseVersion input is optional; fall back to pom.xml so release:prepare gets a non-empty -DreleaseVersion.
          # maven-release-plugin rejects -SNAPSHOT for releaseVersion, so strip the suffix.
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            RELEASE_VERSION=${RELEASE_VERSION%-SNAPSHOT}
            echo "Derived RELEASE_VERSION from pom.xml: $RELEASE_VERSION"
          fi
          # Provide explicit tag + developmentVersion so input-variables phase doesn't need to prompt for defaults
          # (in batch mode, missing defaults raise "Project tag cannot be selected if version is not yet mapped").
          IFS=. read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
          DEV_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          RELEASE_TAG="${ARTIFACT_ID}-${RELEASE_VERSION}"
          echo "Using developmentVersion=$DEV_VERSION tag=$RELEASE_TAG"
          # Capture HEAD so we can reset cleanly whether or not release:prepare creates local commits.
          PRE_PREPARE_SHA=$(git rev-parse HEAD)
          mvn -B release:clean release:prepare -Darguments="-Dmaven.javadoc.skip=true -Dmaven.test.skipTests=true -Dmaven.test.skip=true -Dmaven.deploy.skip=true" \
          -DcheckModificationExcludeList=** -DignoreSnapshots=true -DreleaseVersion=$RELEASE_VERSION -DdevelopmentVersion=$DEV_VERSION -Dtag=$RELEASE_TAG \
          -DpushChanges=false -P "$MAVEN_PROFILES" -DscmServerId=liquibase
          git reset --hard "$PRE_PREPARE_SHA"
          # Remove only maven-release-plugin leftovers; do NOT git-clean everything because the workflow
          # downloads sign_artifact.sh / get_draft_release.sh / upload_asset.sh into .github/ earlier.
          rm -f pom.xml.releaseBackup pom.xml.next pom.xml.tag pom.xml.branch pom.xml.backup release.properties
          # Use GitHub's default branch from repository settings
          echo "Using default branch: $DEFAULT_BRANCH"
          mvn clean install -DskipTests -P "$MAVEN_PROFILES" -DbuildNumber=$DEFAULT_BRANCH

          # Generate source and javadoc jars
          mvn source:jar javadoc:jar -Dmaven.javadoc.skip=false

          # Copy POM to target directory with versioned name
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          cp pom.xml target/${ARTIFACT_ID}-${VERSION}.pom
          echo "Generated artifacts for ${ARTIFACT_ID}-${VERSION}"

      - name: Set pom version to dry_run version
        if: ${{ inputs.dry_run == true }}
        env:
          DRY_RUN_VERSION: ${{ inputs.dry_run_version }}
        run: |
          mvn versions:set -DnewVersion=$DRY_RUN_VERSION-SNAPSHOT -DgenerateBackupPoms=false -DprocessAllModules=true

      - name: Build release artifacts (dry-run)
        if: ${{ inputs.dry_run == true }}
        id: build-release-artifacts-dry-run
        env:
          DRY_RUN_VERSION: ${{ inputs.dry_run_version }}
          MAVEN_PROFILES: ${{ inputs.mavenProfiles }}
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          mvn -B release:clean release:prepare -DdryRun=true -Darguments="-Dmaven.javadoc.skip=true -Dmaven.test.skipTests=true -Dmaven.test.skip=true -Dmaven.deploy.skip=true" \
          -DcheckModificationExcludeList=** -DignoreSnapshots=true -DreleaseVersion=$DRY_RUN_VERSION -DpushChanges=false -P "$MAVEN_PROFILES" \
          -DscmServerId=liquibase
          # Use current branch name for dry runs
          echo "Using current branch: $CURRENT_BRANCH"
          mvn clean install -DskipTests -P "$MAVEN_PROFILES" -DbuildNumber=$CURRENT_BRANCH

          # Generate source and javadoc jars
          mvn source:jar javadoc:jar -Dmaven.javadoc.skip=false

          # Copy POM to target directory with versioned name
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          cp pom.xml target/${ARTIFACT_ID}-${VERSION}.pom
          echo "Generated artifacts for ${ARTIFACT_ID}-${VERSION}"

      - name: Download multiarchitecture release artifacts
        if: inputs.combineJars
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: multiplatform-artifacts
          path: ${{ inputs.artifactPath }}/target

      - name: Resolve release version
        id: resolve-version
        working-directory: ${{ inputs.artifactPath }}
        env:
          BUILD_JOB_VERSION: ${{ needs.build-multi-architecture.outputs.artifact_version }}
        run: |
          if [ -n "$BUILD_JOB_VERSION" ]; then
            echo "Using version from build-multi-architecture job: $BUILD_JOB_VERSION"
            echo "RELEASE_VERSION=$BUILD_JOB_VERSION" >> $GITHUB_ENV
          else
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            echo "Using version from pom.xml: $VERSION"
            echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          fi

      - name: Convert escaped newlines and set GPG key
        env:
          GPG_SECRET_VAR: ${{ env.GPG_SECRET }}
        run: |
          GPG_KEY_CONTENT="$(printf '%b' "$GPG_SECRET_VAR")"
          {
            echo "GPG_KEY_CONTENT<<GPG_EOF"
            echo "$GPG_KEY_CONTENT"
            echo
            echo "GPG_EOF"
          } >> $GITHUB_ENV
          GPG_KEY_CONTENT="${GPG_KEY_CONTENT//%/%25}"
          GPG_KEY_CONTENT="${GPG_KEY_CONTENT//$'\r'/%0D}"
          GPG_KEY_CONTENT="${GPG_KEY_CONTENT//$'\n'/%0A}"
          echo "::add-mask::${GPG_KEY_CONTENT}"

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6
        with:
          gpg_private_key: ${{ env.GPG_KEY_CONTENT }}
          passphrase: ${{ env.GPG_PASSPHRASE }}

      - name: Set root directory variable
        run: echo "REPO_ROOT=$(git rev-parse --show-toplevel)" >> $GITHUB_ENV

      - name: Sign Files for Draft Release
        if: ${{ inputs.dry_run == false }}
        working-directory: ${{ inputs.artifactPath }}
        env:
          ARTIFACT_PATH: ${{ inputs.artifactPath }}
        run: |
          gpg -K
          version=$RELEASE_VERSION
          echo "Signing artifacts for version: $version"
          $REPO_ROOT/.github/sign_artifact.sh $REPO_ROOT/$ARTIFACT_PATH/target/$artifact_id-${version}.jar
          $REPO_ROOT/.github/sign_artifact.sh $REPO_ROOT/$ARTIFACT_PATH/target/$artifact_id-${version}.pom
          $REPO_ROOT/.github/sign_artifact.sh $REPO_ROOT/$ARTIFACT_PATH/target/$artifact_id-${version}-javadoc.jar
          $REPO_ROOT/.github/sign_artifact.sh $REPO_ROOT/$ARTIFACT_PATH/target/$artifact_id-${version}-sources.jar

      - name: Sign Files for Draft Release (dry-run)
        if: ${{ inputs.dry_run == true }}
        working-directory: ${{ inputs.artifactPath }}
        env:
          ARTIFACT_PATH: ${{ inputs.artifactPath }}
        run: |
          gpg -K
          version=$RELEASE_VERSION
          echo "Signing artifacts for version: $version"
          $REPO_ROOT/.github/sign_artifact.sh $REPO_ROOT/$ARTIFACT_PATH/target/$artifact_id-${version}.jar
          $REPO_ROOT/.github/sign_artifact.sh $REPO_ROOT/$ARTIFACT_PATH/target/$artifact_id-${version}.pom
          $REPO_ROOT/.github/sign_artifact.sh $REPO_ROOT/$ARTIFACT_PATH/target/$artifact_id-${version}-javadoc.jar
          $REPO_ROOT/.github/sign_artifact.sh $REPO_ROOT/$ARTIFACT_PATH/target/$artifact_id-${version}-sources.jar

      - name: Set draft release title
        if: ${{ inputs.dry_run == false }}
        working-directory: ${{ inputs.artifactPath }}
        id: set-release-title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          version=$RELEASE_VERSION
          RELEASE_TITLE="v$version"
          echo "Updating release title to $RELEASE_TITLE"
          curl -X PATCH -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" -H "Authorization: Bearer $GITHUB_TOKEN" -d '{"name": "'"$RELEASE_TITLE"'", "tag_name": "'"v$version"'"}' "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID"

      - name: Attach Files to Draft Release
        if: ${{ inputs.dry_run == false }}
        working-directory: ${{ inputs.artifactPath }}
        id: upload-release-asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_NAME_PREFIX_VAR: ${{ env.artifact_id }}
          ASSET_DIR: ./target
        run: |
          version=$RELEASE_VERSION
          export ASSET_NAME_PREFIX="${ASSET_NAME_PREFIX_VAR}-"
          $REPO_ROOT/.github/upload_asset.sh $version

      - name: Set artifact path
        id: set-artifact-path
        if: ${{ inputs.dry_run == true }}
        env:
          INPUT_ARTIFACT_PATH: ${{ inputs.artifactPath || '.' }}
        run: echo "ARTIFACT_PATH=$INPUT_ARTIFACT_PATH" >> $GITHUB_OUTPUT

      - name: Collect artifacts for release (dry-run)
        if: ${{ inputs.dry_run == true }}
        env:
          COLLECT_ARTIFACT_PATH: ${{ steps.set-artifact-path.outputs.ARTIFACT_PATH }}
        run: |
          mkdir -p /tmp/release-artifacts
          # Find and copy all artifacts from target directories (supports multi-module)
          find "$COLLECT_ARTIFACT_PATH" -type f \( -name "*.jar" -o -name "*.pom" -o -name "*.asc" \) -path "*/target/*" ! -name "original-*" -exec cp {} /tmp/release-artifacts/ \;
          echo "Collected artifacts:"
          ls -lh /tmp/release-artifacts/

      - name: Attach Files to Draft Release (dry-run)
        id: attach-files-dry-run
        if: ${{ inputs.dry_run == true }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: v${{ inputs.dry_run_version }}
          fail_on_unmatched_files: true
          body: Dry Run ${{ inputs.dry_run_version }}
          generate_release_notes: true
          draft: true
          files: /tmp/release-artifacts/*

      - name: Get upload_zip.sh Script File
        if: inputs.zip == 'true'
        run: |
          curl -o $PWD/.github/upload_zip.sh https://raw.githubusercontent.com/liquibase/build-logic/main/.github/upload_zip.sh
          chmod +x $PWD/.github/upload_zip.sh

      - name: Attach Zip File to Draft Release
        if: inputs.zip == 'true'
        id: upload-release-zip
        run: ./.github/upload_zip.sh $RELEASE_VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_NAME_PREFIX: "${{ env.artifact_id }}-"
          ASSET_DIR: ./target

  notify-failure:
    name: Notify Slack on Release Artifact Failure
    needs: [build-multi-architecture, combineJars, attach-to-release]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Notify Slack on Failure
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        env:
          SLACK_COLOR: failure
          SLACK_MESSAGE: |
            Workflow: extension-attach-artifact-release
            Repository: ${{ github.repository }}
            Version: ${{ needs.build-multi-architecture.outputs.artifact_version || inputs.dry_run_version || 'unknown' }}
            Dry run: ${{ inputs.dry_run }}
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            <@U042HRTL4DT>
          SLACK_TITLE: "Release artifact attachment failed for ${{ github.repository }}"
          SLACK_USERNAME: liquibot
          SLACK_WEBHOOK: ${{ env.NIGHTLY_BUILDS_SLACK_WEBHOOK }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_FOOTER: "${{ github.repository }}"
          SLACK_LINK_NAMES: true
