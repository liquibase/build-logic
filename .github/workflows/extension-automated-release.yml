name: Automated Extension Release

on:
  workflow_call:
    inputs:
      version:
        description: "Version to release (4.26.0, 4.26.1, etc.)"
        required: true
        type: string
      repositories:
        description: "Comma separated list of repositories to release"
        required: false
        default: '["liquibase-bigquery","liquibase-cache","liquibase-cassandra","liquibase-cosmosdb","liquibase-db2i","liquibase-filechangelog","liquibase-nochangeloglock","liquibase-hanadb","liquibase-maxdb","liquibase-modify-column","liquibase-mssql","liquibase-oracle","liquibase-postgresql","liquibase-redshift","liquibase-sqlfire","liquibase-teradata","liquibase-vertica","liquibase-yugabytedb","liquibase-hibernate","liquibase-parent-pom","liquibase-cdi","liquibase-cdi-jakarta"]'
        type: string

permissions:
  contents: write
  security-events: read
  packages: write
  id-token: write

jobs:
  check-security-vulnerabilities:
    # 1. Parse the input repositories into an array.
    # 2. Initialize a flag to track if there are security vulnerabilities.
    # 3. Check for open Dependabot security alerts.
    # 4. Print the status of security vulnerabilities for each repository.
    # 5. Set the flag if security vulnerabilities are found in any repository.
    # 6. If security vulnerabilities are found in any repository, print an error message and exit with an error code.
    runs-on: ubuntu-latest
    name: Check Security Vulnerabilities
    strategy:
      fail-fast: false # Continue running jobs even if one fails
      matrix:
        repository: ${{ fromJson(inputs.repositories) }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repository }}

      - name: Security
        env:
          REPOSITORY: ${{ matrix.repository }}
        run: |
          security_fail=false
          echo "INFO: Checking repository: $REPOSITORY"
          security_url="https://api.github.com/repos/liquibase/$REPOSITORY/dependabot/alerts?state=open"
          response=$(curl -s -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" $security_url | jq length)
          echo "INFO: Open Alerts: $response"
          if [[ $response == "0" ]]; then
            echo "INFO: Security vulnerabilities for $REPOSITORY are addressed."
          else
            echo "ERROR: Security vulnerabilities for $REPOSITORY are not addressed."
            security_fail=true
          fi
          if [[ $security_fail == true ]]; then
            echo "ERROR: Security vulnerabilities are not addressed for $REPOSITORY"
            exit 1
          fi

  run-extensions-dependabot:
    needs: check-security-vulnerabilities
    runs-on: ubuntu-latest
    name: Dependabot
    strategy:
      matrix:
        repository: ${{ fromJson(inputs.repositories) }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          
      - name: Install Dependabot CLI
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          echo "INFO: Installing Dependabot CLI"
          gh release download --repo dependabot/cli -p "*linux-amd64.tar.gz"
          tar xzvf *.tar.gz >/dev/null 2>&1
          chmod +x dependabot
          sudo mv dependabot /usr/local/bin
          dependabot --version
          echo "INFO: Dependabot CLI installed successfully"

      # https://github.com/dependabot/cli?tab=readme-ov-file#dependabot-update
      - name: Run dependabot on extension
        env:
          LOCAL_GITHUB_ACCESS_TOKEN: ${{ steps.get-token.outputs.token }}
          REPOSITORY: ${{ matrix.repository }}
        run: |
          echo "INFO: Running Dependabot on repository: $REPOSITORY"

          set +e
          output=$(dependabot update maven "liquibase/$REPOSITORY" 2>&1)
          exit_code=$?
          set -e

          echo "$output"

          if [ $exit_code -ne 0 ]; then
            # Check if there were any successful updates
            if echo "$output" | grep -q "Changes to Dependabot Pull Requests"; then
              echo "INFO: Some dependencies were successfully updated"

              # Check if only known problematic dependencies failed
              if echo "$output" | grep -qE "(com\.simba\.googlebigquery\.jdbc:GoogleBigQueryJDBC42|com\.liquibase:liquibase-extension-testing).*private_source_authentication_failure"; then
                echo "WARNING: Known authentication issues with private dependencies:"
                echo "$output" | grep -A 5 "Dependencies failed to update" || true
                echo "INFO: These dependencies will be skipped. Please update manually if needed."
                echo "INFO: Continuing with other successfully updated dependencies for $REPOSITORY"
                # Exit successfully to continue the workflow
                exit 0
              fi
            fi

            # Other error - fail the step
            echo "ERROR: Dependabot failed with unexpected error for $REPOSITORY"
            exit $exit_code
          fi

          echo "INFO: Dependabot update completed successfully for $REPOSITORY"

  update-pom:
    needs: check-security-vulnerabilities
    runs-on: ubuntu-latest
    name: Update pom.xml
    strategy:
      matrix:
        repository: ${{ fromJson(inputs.repositories) }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repository }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: "liquibase/${{ matrix.repository }}"
          token: ${{ steps.get-token.outputs.token }}

      - name: Set up Git
        run: |
          git config --local user.email "64099989+liquibot@users.noreply.github.com"
          git config --local user.name "liquibot"

      # look for dependencies in maven
      - name: maven-settings-xml-action
        uses: whelk-io/maven-settings-xml-action@9dc09b23833fa9aa7f27b63db287951856f3433d # v22
        with:
          repositories: |
            [
              {
                "id": "liquibase",
                "url": "https://maven.pkg.github.com/liquibase/liquibase",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true",
                  "updatePolicy": "always"
                }
              },
              {
                "id": "liquibase-pro",
                "url": "https://maven.pkg.github.com/liquibase/liquibase-pro",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true",
                  "updatePolicy": "always"
                }
              }
            ]
          servers: |
            [
              {
                "id": "liquibase-pro",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              },
              {
                "id": "liquibase",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              }
            ]

      - name: Update extension version to next SNAPSHOT
        if: ${{ matrix.repository != 'liquibase-parent-pom' }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "INFO: Updating extension version to ${VERSION}-SNAPSHOT"
          mvn versions:set -DnewVersion="${VERSION}-SNAPSHOT"
          echo "INFO: Extension version updated"

      - name: Update pom.xml
        env:
          VERSION: ${{ inputs.version }}
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}
          REPOSITORY: ${{ matrix.repository }}
        run: |
          echo "INFO: Updating liquibase.version in all pom.xml files to ${VERSION}"
          find . -name "pom.xml" -exec sed -i "s/<liquibase.version>.*<\/liquibase.version>/<liquibase.version>${VERSION}<\/liquibase.version>/" {} \;
          git add -A '*.xml'
          # Check if there are changes before committing
          if git diff-index --quiet HEAD --; then
            echo "INFO: No changes to commit."
          else
            git commit -m "Update liquibase.version to ${VERSION}"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/liquibase/${REPOSITORY}.git
            git push
            echo "INFO: Changes committed and pushed successfully"
          fi

  release-draft-releases:
    # 1. Initialize a flag to track if the specified version is found.
    # 2. If draft releases are found, check if they contain the specified version to release.
    # 3. If the version is found publish it as the latest release.
    # 4. Print relevant information about the process.
    needs: update-pom
    runs-on: ubuntu-latest
    name: Release Draft
    strategy:
      matrix:
        repository: ${{ fromJson(inputs.repositories) }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repository }}
          permission-contents: write
          permission-actions: read

      - name: Check for Artifact in Draft Releases
        env:
          REPOSITORY: ${{ matrix.repository }}
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          echo "INFO: Checking for in-progress CI runs triggered by pom update..."
          REPO_FULL="liquibase/$REPOSITORY"
          DEFAULT_BRANCH=$(gh api "repos/$REPO_FULL" --jq '.default_branch')
          HEAD_SHA=$(gh api "repos/$REPO_FULL/git/ref/heads/${DEFAULT_BRANCH}" --jq '.object.sha')
          echo "INFO: $REPOSITORY HEAD SHA: $HEAD_SHA (branch: $DEFAULT_BRANCH)"

          # Give GitHub a moment to queue any CI runs triggered by the pom commit
          sleep 15

          RUNS=$(gh run list --repo "$REPO_FULL" --commit "$HEAD_SHA" \
            --json databaseId,status,name \
            --jq '.[] | select(.status == "in_progress" or .status == "queued") | "\(.databaseId) \(.name)"')

          if [ -n "$RUNS" ]; then
            echo "INFO: Waiting for in-progress CI runs to complete..."
            while IFS= read -r run_line; do
              RUN_ID=$(echo "$run_line" | cut -d' ' -f1)
              RUN_NAME=$(echo "$run_line" | cut -d' ' -f2-)
              echo "INFO: Watching run $RUN_ID ($RUN_NAME)..."
              if ! gh run watch "$RUN_ID" --repo "$REPO_FULL" --exit-status; then
                echo "ERROR: CI run $RUN_ID ($RUN_NAME) failed — artifacts may be missing or corrupt. Fix CI before retrying the release."
                exit 1
              fi
            done <<< "$RUNS"
            echo "INFO: All CI runs completed"
          else
            echo "INFO: No in-progress CI runs found for HEAD SHA, proceeding immediately"
          fi

          published_drafts_file=published_drafts.txt
          echo "INFO: Checking repository: $REPOSITORY"
          DRAFT_RELEASE=$(gh api --paginate "repos/liquibase/$REPOSITORY/releases" \
            | jq -s 'add' \
            | jq --arg ver "v$VERSION" '[.[] | select(.draft == true and .tag_name == $ver)] | sort_by(.created_at) | last')
          assets=$(echo "$DRAFT_RELEASE" | jq -r '.assets[]')
          echo "INFO: Assets: $assets"
          if [ -z "$assets" ]; then
            echo "ERROR: No assets found in draft release for $REPOSITORY v$VERSION"
            exit 1
          fi
          if ! echo "$DRAFT_RELEASE" | jq -e --arg ver "$VERSION" '.assets | map(select(.name | contains($ver))) | length > 0' > /dev/null; then
            echo "ERROR: No asset containing '$VERSION' found in draft release for $REPOSITORY"
            exit 1
          fi
          echo "INFO: Found an asset containing '$VERSION'"
          RELEASE_ID=$(echo "$DRAFT_RELEASE" | jq -r '.id')
          echo "INFO: Newest Draft release ID: $RELEASE_ID"
          echo "INFO: Publishing the draft release as the latest release to https://api.github.com/repos/liquibase/$REPOSITORY/releases/$RELEASE_ID"
          PATCH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" -H "Authorization: Bearer $GITHUB_TOKEN" -d '{"draft": false}' "https://api.github.com/repos/liquibase/$REPOSITORY/releases/$RELEASE_ID")
          if [ "$PATCH_STATUS" != "200" ]; then
            echo "ERROR: Failed to publish draft release $RELEASE_ID (HTTP $PATCH_STATUS)"
            exit 1
          fi
          echo "INFO: Draft release published as the latest release for $REPOSITORY"
          echo "$REPOSITORY: v$VERSION" >> $published_drafts_file

  publish-to-central-portal:
    # 1. This job uploads extension artifacts to the Central Portal API.
    # 2. It downloads artifacts from published GitHub releases and creates Maven bundles.
    # 3. Each bundle is uploaded to Central Portal with USER_MANAGED publishing type.
    # 4. Operators must manually approve deployments at central.sonatype.com before they go live.
    needs: release-draft-releases
    runs-on: ubuntu-latest
    name: Central Portal
    strategy:
      matrix:
        repository: ${{ fromJson(inputs.repositories) }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repository }}

      - name: Get build-logic ref
        id: build-logic-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # In reusable workflows, github.workflow_sha resolves to the caller's SHA.
          # Query the API to find the actual ref/SHA of this reusable workflow.
          REF=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --jq '.referenced_workflows[] | select(.path | startswith("liquibase/build-logic/.github/workflows/extension-automated-release")) | .ref')
          echo "ref=${REF:-refs/heads/main}" >> $GITHUB_OUTPUT

      - name: Checkout build-logic
        uses: actions/checkout@v6
        with:
          repository: liquibase/build-logic
          ref: ${{ steps.build-logic-ref.outputs.ref }}
          path: build-logic
          sparse-checkout: .github/actions/publish-to-central-portal

      - name: Wait for GitHub releases to be available
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
          REPOSITORY: ${{ matrix.repository }}
        run: |
          echo "INFO: Polling for published release v$VERSION in $REPOSITORY..."
          MAX_WAIT=300
          WAITED=0
          POLL_INTERVAL=15

          while [ $WAITED -lt $MAX_WAIT ]; do
            RELEASE_STATUS=$(gh release view "v$VERSION" --repo "liquibase/$REPOSITORY" \
              --json isDraft --jq '.isDraft' 2>/dev/null || echo "not_found")
            if [ "$RELEASE_STATUS" = "false" ]; then
              echo "INFO: Published release v$VERSION found after ${WAITED}s"
              break
            else
              echo "INFO: Release v$VERSION not yet published (status: $RELEASE_STATUS) after ${WAITED}s, waiting..."
            fi
            sleep $POLL_INTERVAL
            WAITED=$((WAITED + POLL_INTERVAL))
          done

          if [ $WAITED -ge $MAX_WAIT ]; then
            echo "ERROR: Timed out after ${MAX_WAIT}s waiting for published release v$VERSION in $REPOSITORY"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Wait for published release and download artifacts
        id: download-artifacts
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
          REPOSITORY: ${{ matrix.repository }}
        run: |
          echo "INFO: Waiting for published release v$VERSION for $REPOSITORY..."

          MAX_WAIT=300
          POLL_INTERVAL=15
          elapsed=0

          # Poll until the release is published (non-draft) or timeout
          while [ $elapsed -lt $MAX_WAIT ]; do
            if IS_DRAFT=$(gh release view "v$VERSION" --repo "liquibase/$REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null); then
              if [ "$IS_DRAFT" = "false" ]; then
                echo "INFO: Found published release v$VERSION for $REPOSITORY (after ${elapsed}s)"
                break
              fi
              echo "INFO: Release v$VERSION exists but is still a draft... (${elapsed}s/${MAX_WAIT}s)"
            else
              echo "INFO: Release v$VERSION not found yet... (${elapsed}s/${MAX_WAIT}s)"
            fi
            sleep $POLL_INTERVAL
            elapsed=$((elapsed + POLL_INTERVAL))
          done

          if [ $elapsed -ge $MAX_WAIT ]; then
            echo "ERROR: Timed out after ${MAX_WAIT}s waiting for published release v$VERSION for $REPOSITORY"
            exit 1
          fi

          # Download release assets using gh CLI, which handles private repo
          # auth correctly (unlike browser_download_url which fails on redirect).
          # Only download JARs, POMs, and GPG signatures — Maven generates its own checksums.
          mkdir -p artifacts
          if ! gh release download "v$VERSION" \
            --repo "liquibase/$REPOSITORY" \
            --pattern "*.jar" --pattern "*.pom" \
            --pattern "*.asc" \
            --dir artifacts; then
            echo "ERROR: gh release download failed for $REPOSITORY v$VERSION"
            exit 1
          fi

          # Check if any POM file was downloaded
          if ls artifacts/*.pom 1>/dev/null 2>&1; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
            echo "INFO: Found release artifacts for $REPOSITORY"
          else
            echo "ERROR: No POM file found in release artifacts for $REPOSITORY"
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Publish to Central Portal
        if: steps.download-artifacts.outputs.has_artifacts == 'true'
        uses: ./build-logic/.github/actions/publish-to-central-portal
        id: publish
        with:
          artifacts-dir: artifacts
          version: ${{ inputs.version }}
          sonatype-username: ${{ env.SONATYPE_USERNAME }}
          sonatype-token: ${{ env.SONATYPE_TOKEN }}

      - name: Track published extensions
        if: steps.download-artifacts.outputs.has_artifacts == 'true'
        env:
          REPOSITORY: ${{ matrix.repository }}
          VERSION: ${{ inputs.version }}
          DEPLOYMENT_ID: ${{ steps.publish.outputs.deployment-id }}
        run: |
          echo "$REPOSITORY: v${VERSION} (${DEPLOYMENT_ID})" >> published_extensions.txt

      - name: Archive published extensions
        uses: actions/upload-artifact@v7
        with:
          name: published-extensions-${{ matrix.repository }}
          path: published_extensions.txt
          if-no-files-found: ignore
