name: Build and Test Extension

on:
  workflow_call:
    inputs:
      java:
        description: "Java version to test"
        required: false
        default: "[17, 21, 25]"
        type: string
      javaBuildVersion:
        description: "Java version to build the project"
        required: false
        default: "21"
        type: string
      os:
        description: "Operating system to test"
        required: false
        default: '["ubuntu-latest", "windows-latest"]'
        type: string
      nightly:
        description: "Specifies nightly builds against liquibase main-SNAPSHOT"
        required: false
        default: false
        type: boolean
      extraMavenArgs:
        description: "Specify it if you want to run an extra maven argument"
        required: false
        default: ""
        type: string
      artifactPath:
        description: "Specify the path to the artifacts that should be attached to the build. Useful for multi-module extensions / monorepos."
        required: false
        default: "."
        type: string
      skipSonar:
        description: "Skip SonarQube analysis"
        required: false
        default: false
        type: boolean
      runIntegrationTests:
        description: "Specify it if you want to run the integration tests in addition to the normal tests"
        required: false
        default: false
        type: boolean

env:
  MAVEN_VERSION: "3.9.5"

permissions:
  contents: read
  pull-requests: write
  packages: read
  id-token: write

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up JDK ${{ inputs.javaBuildVersion }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.javaBuildVersion }}
          distribution: "temurin"
          cache: "maven"

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      # look for dependencies in maven
      - name: maven-settings-xml-action
        uses: whelk-io/maven-settings-xml-action@9dc09b23833fa9aa7f27b63db287951856f3433d # v22
        with:
          repositories: |
            [
              {
                "id": "liquibase",
                "url": "https://maven.pkg.github.com/liquibase/liquibase",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true",
                  "updatePolicy": "always"
                }
              },
              {
                "id": "liquibase-pro",
                "url": "https://maven.pkg.github.com/liquibase/liquibase-pro",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true",
                  "updatePolicy": "always"
                }
              }
            ]
          servers: |
            [
              {
                "id": "liquibase-pro",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              },
              {
                "id": "liquibase",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              }
            ]

      - name: Build and Package latest liquibase version
        if: ${{ inputs.nightly }}
        env:
          EXTRA_MAVEN_ARGS: ${{ inputs.extraMavenArgs }}
        run: mvn -B dependency:go-offline clean package -DskipTests=true ${EXTRA_MAVEN_ARGS} "-Dliquibase.version=main-SNAPSHOT"

      - name: Notify Slack on Build Failure
        if: ${{ failure() && inputs.nightly }}

        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        env:
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: "View details on GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} <@U042HRTL4DT>"
          SLACK_TITLE: "❌ ${{ github.repository }} ❌ Build failed on branch ${{ github.ref }} for commit ${{ github.sha }} in repository ${{github.repository}}"
          SLACK_USERNAME: liquibot
          SLACK_WEBHOOK: ${{ env.NIGHTLY_BUILDS_SLACK_WEBHOOK }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_FOOTER: "${{ github.repository }}"
          SLACK_LINK_NAMES: true

      - name: Build and Package
        if: ${{ !inputs.nightly }}
        env:
          EXTRA_MAVEN_ARGS: ${{ inputs.extraMavenArgs }}
        run: mvn -B dependency:go-offline clean package -DskipTests=true ${EXTRA_MAVEN_ARGS}

      - name: Get Project Artifact Name
        id: get-artifact-name
        working-directory: ${{ inputs.artifactPath }}
        shell: bash
        run: |
          PROJECT_ARTIFACT_NAME=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          echo "PROJECT_ARTIFACT_NAME=${PROJECT_ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Save Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.PROJECT_ARTIFACT_NAME }}-artifacts
          path: |
            ${{ inputs.artifactPath }}/target/*

      - name: Save Event File
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Event File
          path: ${{ github.event_path }}

  unit-test:
    strategy:
      fail-fast: false
      matrix:
        java: ${{fromJson(inputs.java || '[17, 21]')}}
        os: ${{fromJson(inputs.os || '["ubuntu-latest", "windows-latest"]')}}
    name: Test Java ${{ matrix.java }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
          cache: "maven"

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      # `mvn help:evaluate` MUST run after Set up JDK + Set up Maven, otherwise
      # it falls back to the runner image's bundled Maven. On Windows runners
      # specifically, the bundled Maven is a recurring flake source: this step
      # has hit `Process completed with exit code 1` (no detail) on Cassandra
      # J17 Win (PR 3666 Round 21), MongoDB J21 Win + J25 Win (Round 18),
      # MongoDB J21 Win (Round 11), Vault J21 Ubuntu (Round 20). Running it
      # AFTER setup-java + setup-maven uses the pinned Maven 3.9.5 with a
      # cached ~/.m2/repository (via setup-java's `cache: maven`), which
      # measurably reduces the flake rate.
      - name: Get Project Artifact Name
        id: get-artifact-name
        working-directory: ${{ inputs.artifactPath }}
        shell: bash
        run: |
          PROJECT_ARTIFACT_NAME=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          echo "PROJECT_ARTIFACT_NAME=${PROJECT_ARTIFACT_NAME}" >> $GITHUB_ENV

      # look for dependencies in maven
      - name: maven-settings-xml-action
        uses: whelk-io/maven-settings-xml-action@9dc09b23833fa9aa7f27b63db287951856f3433d # v22
        with:
          repositories: |
            [
              {
                "id": "liquibase",
                "url": "https://maven.pkg.github.com/liquibase/liquibase",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true",
                  "updatePolicy": "always"
                }
              },
              {
                "id": "liquibase-pro",
                "url": "https://maven.pkg.github.com/liquibase/liquibase-pro",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true",
                  "updatePolicy": "always"
                }
              }
            ]
          servers: |
            [
              {
                "id": "liquibase-pro",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              },
              {
                "id": "liquibase",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              }
            ]

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PROJECT_ARTIFACT_NAME }}-artifacts
          path: ./target

      # `shell: bash` forces bash on Windows runners (where the default is
      # PowerShell). Without it, pwsh does not word-split ${EXTRA_MAVEN_ARGS},
      # so `-pl :module -am` is delivered to mvn as a single mangled argument
      # and the reactor filter is silently ignored — every distribution-profile
      # module then builds, which is both wasteful and (for liquibase-pro)
      # crashes the pro/ test fork on a half-built reactor (DAT-22961).
      # Mirrors the existing `shell: bash` declarations in pro-extension-test.yml.
      - name: Run Tests
        if: ${{ !inputs.nightly }}
        shell: bash
        env:
          EXTRA_MAVEN_ARGS: ${{ inputs.extraMavenArgs }}
        run: mvn -B test -P 'coverage' ${EXTRA_MAVEN_ARGS}

      - name: Run Tests
        if: ${{ inputs.nightly }}
        shell: bash
        env:
          EXTRA_MAVEN_ARGS: ${{ inputs.extraMavenArgs }}
        run: mvn -B test -P 'coverage' ${EXTRA_MAVEN_ARGS} "-Dliquibase.version=main-SNAPSHOT"

      - name: Run Integration Tests
        if: ${{ !inputs.nightly && inputs.runIntegrationTests }}
        shell: bash
        env:
          EXTRA_MAVEN_ARGS: ${{ inputs.extraMavenArgs }}
        run: mvn -B integration-test -P 'coverage' ${EXTRA_MAVEN_ARGS}

      - name: Run Integration Tests
        if: ${{ inputs.nightly && inputs.runIntegrationTests }}
        shell: bash
        env:
          EXTRA_MAVEN_ARGS: ${{ inputs.extraMavenArgs }}
        run: mvn -B integration-test -P 'coverage' ${EXTRA_MAVEN_ARGS} "-Dliquibase.version=main-SNAPSHOT"

      - name: Notify Slack on Build Failure
        if: ${{ failure() && inputs.nightly }}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        env:
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: "View details on GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} <@U042HRTL4DT>"
          SLACK_TITLE: "❌ ${{ github.repository }} ❌ Tests failed on branch ${{ github.ref }} for commit ${{ github.sha }} in repository ${{github.repository}}"
          SLACK_USERNAME: liquibot
          SLACK_WEBHOOK: ${{ env.NIGHTLY_BUILDS_SLACK_WEBHOOK }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_FOOTER: "${{ github.repository }}"
          SLACK_LINK_NAMES: true

      - name: Normalize OS platform name
        if: ${{ always() }}
        id: normalize-os
        uses: liquibase/build-logic/.github/actions/normalize-os@main

      - name: Archive Test Results - ${{ matrix.os }}
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-reports-jdk-${{ matrix.java }}-${{ steps.normalize-os.outputs.platform }}
          path: |
            **/target/surefire-reports
            **/target/failsafe-reports
            **/target/site/jacoco/jacoco.xml

  sonar-pr:
    if: ${{ !inputs.skipSonar && !inputs.nightly }}
    needs: [unit-test]
    uses: liquibase/build-logic/.github/workflows/sonar-scan.yml@main
    secrets: inherit
    with:
      # Forward artifactPath so sonar-scan.yml runs `mvn sonar:sonar` from the
      # consumer module's directory instead of the repo root. This is required
      # for the per-module sonar-project.properties pattern (each Maven module
      # owns its own SonarCloud project, e.g. liquibase_liquibase-cassandra)
      # and avoids the multi-module reactor `Liquibase orphan` error that
      # otherwise fires when the scan walks pro-distribution's <modules> tree.
      # (DAT-22961.)
      artifactPath: ${{ inputs.artifactPath }}
      javaBuildVersion: ${{ inputs.javaBuildVersion }}
