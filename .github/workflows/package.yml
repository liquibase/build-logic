name: Linux packaging
on:
  workflow_call:
    inputs:
      groupId:
        description: "Value from the groupId field in pom.xml. i.e. org.liquibase"
        required: true
        type: string
      artifactId:
        description: "Value from the artifactId field in pom.xml. i.e. liquibase"
        required: true
        type: string
      version:
        description: "Value from the version field in pom.xml. i.e 4.23.0"
        type: string
      dry_run:
        description: "Flag to indicate if the workflow is triggered to create a dry-run release"
        required: false
        type: boolean
        default: false
      dry_run_zip_url:
        description: "URL of the dry-run zip release"
        required: false
        type: string
      dry_run_tar_gz_url:
        description: "URL of the dry-run tar.gz release"
        required: false
        type: string
      dry_run_release_id:
        description: "ID of the dry-run release"
        required: false
        type: string
    secrets:
      GPG_SECRET:
        description: "GPG_SECRET from the caller workflow"
        required: true
      GPG_PASSPHRASE:
        description: "GPG_PASSPHRASE from the caller workflow"
        required: true
      GPG_SECRET_KEY_ID:
        description: "GPG_SECRET_KEY_ID from the caller workflow"
        required: true
  workflow_dispatch:
    inputs:
      groupId:
        description: "Value from the groupId field in pom.xml. i.e. org.liquibase"
        required: true
        type: string
      artifactId:
        description: "Value from the artifactId field in pom.xml. i.e. liquibase"
        required: true
        type: string
      version:
        description: "Value from the version field in pom.xml. i.e 4.23.0"
        type: string
      dry_run:
        description: "Flag to indicate if the workflow is triggered to create a dry-run release"
        required: false
        type: boolean
        default: false
      dry_run_zip_url:
        description: "URL of the dry-run zip release"
        required: false
        type: string
      dry_run_tar_gz_url:
        description: "URL of the dry-run tar.gz release"
        required: false
        type: string
      dry_run_release_id:
        description: "ID of the dry-run release"
        required: false
        type: string

env:
  MAVEN_VERSION: "3.9.5"

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:

  upload_ansible_role:
    uses: liquibase/liquibase-ansible/.github/workflows/deploy-role.yml@DAT-20255
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      dry_run: ${{ inputs.dry_run }}
      dry_run_tar_gz_url: ${{ inputs.dry_run_tar_gz_url }}
