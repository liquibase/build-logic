name: Release POM to Sonatype

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Set up Java for publishing to Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          server-id: sonatype-nexus-staging
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Configure Git
        run: |
          git config user.name "liquibase-workflows[bot]"
          git config user.email "1241802+liquibase-workflows[bot]@users.noreply.github.com"

      - name: Build release artifacts
        id: build-release-artifacts
        env:
          RELEASE_VERSION: ${{ github.event.inputs.liquibaseVersion }}
        run: |
          mvn -B release:clean release:prepare -Darguments="-DscmServerId=liquibase -Dmaven.javadoc.skip=true -Dmaven.test.skipTests=true -Dmaven.test.skip=true -Dmaven.deploy.skip=true" -DreleaseVersion=$RELEASE_VERSION -DpushChanges=false
          git reset HEAD~ --hard

      - name: Determine build-logic ref
        id: build-logic-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          # Extract ref from workflow_ref (format: owner/repo/path@ref)
          REF="${WORKFLOW_REF##*@}"
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Checkout build-logic
        uses: actions/checkout@v6
        with:
          repository: liquibase/build-logic
          ref: ${{ steps.build-logic-ref.outputs.ref }}
          path: build-logic
          sparse-checkout: .github/actions/publish-to-central-portal

      - name: Get Artifact ID
        id: get-artifact-id
        run: echo "artifact_id=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)" >> $GITHUB_ENV

      - name: Download Release Artifacts
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          tag: "${{ github.event.release.tag_name }}"
          filename: "${{ env.artifact_id }}-*"
          out-file-path: "."

      - name: Publish to Central Portal
        uses: ./build-logic/.github/actions/publish-to-central-portal
        with:
          artifacts-dir: "."
          version: ${{ github.event.release.tag_name }}
          sonatype-username: ${{ env.SONATYPE_USERNAME }}
          sonatype-token: ${{ env.SONATYPE_TOKEN }}

  maven-release:
    needs: release
    uses: liquibase/build-logic/.github/workflows/extension-release-prepare.yml@main
    secrets: inherit
