on:
  workflow_call:
    inputs:
      lb_flavor:
        required: false
        type: string
        default: 'pro'
    secrets:
      bot_token:
        required: true
      gpg_private_key:
        required: true
      gpg_password:
        required: true
      install4j_lic:
        required: true
      install4j_apple_key:
        required: true
      install4j_apple_key_password:
        required: true
      install4j_apple_id:
        required: true
      install4j_apple_id_password:
        required: true
      install4j_win_key:
        required: true
      install4j_win_key_password:
        required: true

jobs:
  package:
    name: Build and Package
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.after}}

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: 8
          distribution: 'adopt'
          cache: 'maven'

      - name: Download liquibase modules
        uses: liquibase/action-download-artifact@v2-liquibase
        with:
          workflow: build.yml
          workflow_conclusion: success
          run_id: "${{ needs.setup.outputs.lastSuccessfulWorkflowId }}"
          name: liquibase-modules
          path: download
          repo: liquibase/liquibase

      - name: Install Downloaded liquibase-modules
        run: |
          find download -name *.jar -exec mvn -B org.apache.maven.plugins:maven-install-plugin:3.0.0-M1:install-file -Dfile={} \;

      - name: Build and Package
        run: mvn -B -Dbuild.pro.number=${{ github.run_number }} -Dbuild.pro.commit=${{ needs.setup.outputs.thisSha }} -Dbuild.pro.branch=${{ needs.setup.outputs.thisBranchName }} -DskipTests=true clean package

      - name: Save Keygen
        uses: actions/upload-artifact@v3
        with:
          name: licensing-keygen
          path: ./licensing/keygen/target/licensing-keygen-0-SNAPSHOT-assembly.zip

      - name: Save Module
        uses: actions/upload-artifact@v3
        with:
          name: liquibase-pro-modules
          path: ./pro/target/liquibase-pro-0-SNAPSHOT.jar

      - name: Built Code Cache
        uses: actions/cache@v3
        with:
          key: built-code-${{ github.run_number }}-${{ github.run_attempt }}
          path: ./**/target
