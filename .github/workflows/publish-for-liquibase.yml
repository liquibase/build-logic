name: Build For Liquibase

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "5 6 * * *"
  # push:
  #   branches:
  #     - "main"
  workflow_call:
    inputs:
      version:
        required: true
        description: "Version to publish"
        type: string
      repository:
        required: true
        description: "Repository to check out"
        type: string
      branch:
        required: true
        description: "Branch to check out"
        type: string

permissions:
  contents: write
  packages: write
  actions: write
  id-token: write

jobs:
  build:
    name: Build Extension
    uses: liquibase/build-logic/.github/workflows/pro-extension-build-for-liquibase.yml@main
    secrets: inherit
    with:
      os: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      java: "[17, 21, 25]"
      combineJars: true
      repository: ${{ inputs.repository }}
      version: ${{ inputs.version }}
      branch: ${{ inputs.branch }}

  publish-main-snapshots-to-gpm:
    name: Publish to GPM
    runs-on: ubuntu-latest
    needs: [build]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GIT_USERNAME: "liquibot"
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Set GIT_PASSWORD
        run: echo "GIT_PASSWORD=${{ env.LIQUIBOT_PAT_GPM_ACCESS }}" >> $GITHUB_ENV

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read
          permission-packages: write

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository }}
          token: ${{ steps.get-token.outputs.token }}

      - name: Download Multiplatform Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: multiplatform-artifacts
          path: ./artifacts

      - name: Verify renamed files
        run: |
          ls -l ./artifacts

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: "temurin"
          cache: "maven"

        #look for dependencies in maven
      - name: Set up Maven settings.xml
        uses: liquibase/build-logic/.github/actions/setup-maven-settings@main
        with:
          gpm-token: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}
          extra-repository-id: extension-repo
          extra-repository-url: https://maven.pkg.github.com/${{ inputs.repository }}

      - name: Publish to GitHub Packages
        env:
          DEPLOY_VERSION: ${{ inputs.version }}
          DEPLOY_REPOSITORY: ${{ inputs.repository }}
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          mvn deploy:deploy-file \
          -Dfile="./artifacts/liquibase-checks-${DEPLOY_VERSION}.jar" \
          -DgroupId=org.liquibase.ext \
          -DartifactId=liquibase-checks \
          -Dversion="${DEPLOY_VERSION}" \
          -Dpackaging=jar \
          -DrepositoryId=liquibase \
          -Durl="https://maven.pkg.github.com/${DEPLOY_REPOSITORY}" \
          -Dusername=liquibot \
          -Dpassword="$GIT_PASSWORD" 
