name: Reusable Docker Build QA

# QA-specific reusable: downloads pre-built Liquibase artifacts (Community from
# GitHub Actions artifacts, Secure from S3), patches Dockerfiles to use the
# downloaded binaries, then builds multi-arch images and pushes to both an
# internal Nexus registry and GHCR for QA inspection.

on:
  workflow_call:
    inputs:
      image_name:
        description: 'QA image name without registry, e.g. liquibase-qa or liquibase-secure-qa'
        required: true
        type: string
      dockerfile_path:
        description: 'Dockerfile to build, e.g. Dockerfile, Dockerfile.alpine, DockerfileSecure'
        required: true
        type: string
      suffix:
        description: 'Image tag suffix, e.g. "" or -alpine or -secure'
        required: false
        type: string
        default: ''
      ghcr_name:
        description: 'Short discriminator used in GHCR tag, e.g. community, alpine, secure'
        required: true
        type: string
      branch_name:
        description: 'Liquibase branch to build from (workflow_dispatch input)'
        required: true
        type: string
      secure_version:
        description: 'Explicit Secure version for RC/production S3 downloads, e.g. 5.0.0-RC10'
        required: false
        type: string
        default: ''
      build_type:
        description: 'Build type: Community or secure'
        required: true
        type: string
      is_rc:
        description: 'Whether this is an RC build (true/false string from matrix)'
        required: false
        type: boolean
        default: false
      platforms:
        description: 'Buildx platform list'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      push_nexus:
        description: 'Push to internal Nexus Docker registry'
        required: false
        type: boolean
        default: true
      push_ghcr:
        description: 'Push to GHCR'
        required: false
        type: boolean
        default: true
      build_logic_ref:
        description: 'Ref for liquibase/build-logic checkout; override during contract-churn branches'
        required: false
        type: string
        default: 'main'
    outputs:
      image_tag:
        description: 'Tag used for the pushed image (branch name or RC version)'
        value: ${{ jobs.build-qa.outputs.image_tag }}
      ghcr_ref:
        description: 'Full GHCR image reference including tag'
        value: ${{ jobs.build-qa.outputs.ghcr_ref }}

jobs:
  build-qa:
    name: Build QA Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
      packages: write
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
      ghcr_ref: ${{ steps.image-tag.outputs.ghcr_ref }}

    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets-liquibase
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Configure AWS credentials for Liquibase-Secure builds
        if: ${{ inputs.build_type == 'secure' }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ env.AWS_PROD_GITHUB_OIDC_ROLE_ARN_LIQUIBASE_PRO }}
          aws-region: us-east-1

      - name: Get GitHub App token for Liquibase-Secure workflow trigger
        if: ${{ inputs.build_type == 'secure' }}
        id: get-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: liquibase
          repositories: liquibase-pro
          permission-contents: write
          permission-actions: write

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get latest workflow run for branch
        if: ${{ inputs.build_type == 'Community' }}
        id: get-workflow-run
        env:
          LIQUIBOT_PAT_GPM_ACCESS: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          # Get the latest successful workflow run for the specified branch
          WORKFLOW_RUN=$(curl -s \
            -H "Authorization: Bearer $LIQUIBOT_PAT_GPM_ACCESS" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/liquibase/liquibase/actions/workflows/run-tests.yml/runs?branch=${BRANCH_NAME}&status=completed&conclusion=success&per_page=1" \
            | jq -r '.workflow_runs[0].id')

          if [ "$WORKFLOW_RUN" = "null" ] || [ -z "$WORKFLOW_RUN" ]; then
            echo "No successful workflow run found for branch ${BRANCH_NAME}"
            echo "Will build using standard Dockerfile from branch source instead"
            echo "workflow_run_id=" >> "$GITHUB_OUTPUT"
            echo "has_workflow_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found workflow run ID: $WORKFLOW_RUN"
            echo "workflow_run_id=$WORKFLOW_RUN" >> "$GITHUB_OUTPUT"
            echo "has_workflow_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download liquibase build artifact (Community) or from S3 (Liquibase-Secure)
        id: download-artifact
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          SECURE_VERSION: ${{ inputs.secure_version }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          LIQUIBOT_PAT_GPM_ACCESS: ${{ env.LIQUIBOT_PAT_GPM_ACCESS }}
          HAS_WORKFLOW_RUN: ${{ steps.get-workflow-run.outputs.has_workflow_run }}
          WORKFLOW_RUN_ID: ${{ steps.get-workflow-run.outputs.workflow_run_id }}
        run: |
          if [[ "$BUILD_TYPE" == "secure" ]]; then
            echo "Downloading Liquibase Secure build from S3..."

            # Determine S3 path based on whether secure_version is provided
            if [[ -n "$SECURE_VERSION" ]]; then
              echo "Using secure_version: $SECURE_VERSION"
              # Extract base version and RC number for RC versions
              VERSION="$SECURE_VERSION"
              if [[ "$VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-RC([0-9]+)$ ]]; then
                BASE_VERSION="${BASH_REMATCH[1]}"
                RC_NUMBER="${BASH_REMATCH[2]}"
                LIQUIBASE_SECURE_ZIP="liquibase-secure-${VERSION}.tar.gz"
                S3_URL="s3://repo.liquibase.com/non-releases/secure/${VERSION}/${LIQUIBASE_SECURE_ZIP}"
                echo "Using RC S3 path: $S3_URL"
              else
                # Regular production version
                LIQUIBASE_SECURE_ZIP="liquibase-secure-${VERSION}.zip"
                S3_URL="s3://repo.liquibase.com/releases/secure/${VERSION}/${LIQUIBASE_SECURE_ZIP}"
                echo "Using production S3 path: $S3_URL"
              fi
            else
              echo "Using branch-based build: $BRANCH_NAME"
              # Original branch-based logic
              LIQUIBASE_SECURE_ZIP="liquibase-secure-${BRANCH_NAME}.zip"
              S3_URL="s3://repo.liquibase.com/releases/secure/${BRANCH_NAME}/$LIQUIBASE_SECURE_ZIP"
            fi

            echo "Downloading from S3: $S3_URL"

            # Try to download from S3 first
            if ! aws s3 cp "$S3_URL" "$LIQUIBASE_SECURE_ZIP" 2>/dev/null; then
              echo "Failed to download liquibase-secure build from S3. File may not exist yet."

              # Check if it's a 403/404 error (file doesn't exist)
              if aws s3 ls "$S3_URL" >/dev/null 2>&1; then
                echo "File exists but access denied. Check permissions."
                exit 1
              else
                echo "Liquibase-Secure build not found in S3."
                # If secure_version is provided, don't trigger workflow - the build should exist
                if [[ -n "$SECURE_VERSION" ]]; then
                  echo "ERROR: secure_version specified but build not found in S3. Build should already exist for version $SECURE_VERSION"
                  echo "trigger_liquibase_secure_workflow=false" >> "$GITHUB_OUTPUT"
                  echo "build_ready=false" >> "$GITHUB_OUTPUT"
                  echo "use_fallback=true" >> "$GITHUB_OUTPUT"
                else
                  echo "Branch-based build not found. Will trigger workflow to create it..."
                  echo "trigger_liquibase_secure_workflow=true" >> "$GITHUB_OUTPUT"
                  echo "build_ready=false" >> "$GITHUB_OUTPUT"
                  echo "use_fallback=false" >> "$GITHUB_OUTPUT"
                fi
              fi
            else
              echo "Successfully downloaded Liquibase-Secure build from S3"
              echo "trigger_liquibase_secure_workflow=false" >> "$GITHUB_OUTPUT"
              echo "build_ready=true" >> "$GITHUB_OUTPUT"
              echo "use_fallback=false" >> "$GITHUB_OUTPUT"

              # Extract the liquibase Secure archive
              mkdir -p liquibase-build
              if [[ "$LIQUIBASE_SECURE_ZIP" == *.tar.gz ]]; then
                tar -xzf "$LIQUIBASE_SECURE_ZIP" -C liquibase-build/
                echo "Liquibase Secure build extracted from tar.gz to liquibase-build/"
              else
                unzip -q "$LIQUIBASE_SECURE_ZIP" -d liquibase-build/
                echo "Liquibase Secure build extracted from zip to liquibase-build/"
              fi
            fi

          else
            # Community build handling
            if [[ "$HAS_WORKFLOW_RUN" == "false" ]]; then
              echo "No workflow run available, will use fallback build from branch source"
              echo "build_ready=false" >> "$GITHUB_OUTPUT"
              echo "use_fallback=true" >> "$GITHUB_OUTPUT"
            else
              echo "Downloading Community build from GitHub artifacts..."

              # Get artifact download URL
              ARTIFACT_NAME="liquibase-zip-${BRANCH_NAME}"
              echo "Looking for artifact: $ARTIFACT_NAME"

              ARTIFACTS_RESPONSE=$(curl -s \
                -H "Authorization: Bearer $LIQUIBOT_PAT_GPM_ACCESS" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/liquibase/liquibase/actions/runs/${WORKFLOW_RUN_ID}/artifacts")

              echo "Available artifacts:"
              echo "$ARTIFACTS_RESPONSE" | jq -r '.artifacts[].name'

              ARTIFACT_URL=$(echo "$ARTIFACTS_RESPONSE" | jq -r ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .archive_download_url")

              if [ "$ARTIFACT_URL" = "null" ] || [ -z "$ARTIFACT_URL" ]; then
                echo "Artifact $ARTIFACT_NAME not found in workflow run"
                echo "Available artifacts:"
                echo "$ARTIFACTS_RESPONSE" | jq -r '.artifacts[].name'
                echo "Will use fallback build from branch source instead"
                echo "build_ready=false" >> "$GITHUB_OUTPUT"
                echo "use_fallback=true" >> "$GITHUB_OUTPUT"
              else
                echo "Downloading artifact from: $ARTIFACT_URL"

                # Download and extract artifact
                curl -L \
                  -H "Authorization: Bearer $LIQUIBOT_PAT_GPM_ACCESS" \
                  -H "Accept: application/vnd.github.v3+json" \
                  -o liquibase-artifact.zip \
                  "$ARTIFACT_URL"

                # Extract the artifact
                unzip -q liquibase-artifact.zip
                echo "Artifact contents:"
                ls -la

                # Find the liquibase zip file inside the artifact
                LIQUIBASE_ZIP=$(find . -name "liquibase-*.zip" -type f | head -1)
                if [ -z "$LIQUIBASE_ZIP" ]; then
                  echo "No liquibase zip file found in artifact"
                  echo "Contents of extracted artifact:"
                  find . -type f
                  echo "Will use fallback build from branch source instead"
                  echo "build_ready=false" >> "$GITHUB_OUTPUT"
                  echo "use_fallback=true" >> "$GITHUB_OUTPUT"
                else
                  echo "Found liquibase zip: $LIQUIBASE_ZIP"

                  # Extract the liquibase zip
                  mkdir -p liquibase-build
                  unzip -q "$LIQUIBASE_ZIP" -d liquibase-build/

                  echo "Liquibase build extracted to liquibase-build/"
                  echo "build_ready=true" >> "$GITHUB_OUTPUT"
                  echo "use_fallback=false" >> "$GITHUB_OUTPUT"
                fi
              fi
            fi
          fi

          # Only show contents if build is ready
          if [[ -d "liquibase-build" ]]; then
            echo "Contents of liquibase-build:"
            ls -la liquibase-build/
          fi

      - name: Trigger Liquibase Secure Release Workflow
        if: ${{ inputs.build_type == 'secure' && steps.download-artifact.outputs.trigger_liquibase_secure_workflow == 'true' && steps.download-artifact.outputs.use_fallback != 'true' }}
        id: trigger-liquibase-secure-release
        continue-on-error: true
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7 # v4.0.0
        with:
          workflow: secure-release-to-s3.yml
          token: ${{ steps.get-token.outputs.token }}
          repo: liquibase/liquibase-pro
          inputs: '{"version": "${{ inputs.branch_name }}"}'
          ref: ${{ inputs.branch_name }}
          wait-for-completion: true
          wait-for-completion-timeout: 60m
          wait-for-completion-interval: 10m

      - name: Download Liquibase Secure build from S3 after workflow completion
        if: ${{ inputs.build_type == 'secure' && steps.download-artifact.outputs.trigger_liquibase_secure_workflow == 'true' && steps.download-artifact.outputs.use_fallback != 'true' }}
        id: download-after-trigger
        env:
          SECURE_VERSION: ${{ inputs.secure_version }}
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          # Determine S3 path based on whether secure_version is provided (same logic as initial download)
          if [[ -n "$SECURE_VERSION" ]]; then
            echo "Using secure_version: $SECURE_VERSION"
            VERSION="$SECURE_VERSION"
            if [[ "$VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-RC([0-9]+)$ ]]; then
              BASE_VERSION="${BASH_REMATCH[1]}"
              RC_NUMBER="${BASH_REMATCH[2]}"
              LIQUIBASE_SECURE_ZIP="liquibase-secure-${VERSION}.tar.gz"
              S3_URL="s3://repo.liquibase.com/releases/rc/${VERSION}/${LIQUIBASE_SECURE_ZIP}"
            else
              LIQUIBASE_SECURE_ZIP="liquibase-secure-${VERSION}.zip"
              S3_URL="s3://repo.liquibase.com/releases/secure/${VERSION}/${LIQUIBASE_SECURE_ZIP}"
            fi
          else
            LIQUIBASE_SECURE_ZIP="liquibase-secure-${BRANCH_NAME}.zip"
            S3_URL="s3://repo.liquibase.com/releases/secure/${BRANCH_NAME}/$LIQUIBASE_SECURE_ZIP"
          fi

          echo "Downloading Liquibase Secure build from S3 after workflow completion..."

          if ! aws s3 cp "$S3_URL" "$LIQUIBASE_SECURE_ZIP"; then
            echo "Failed to download Liquibase Secure build even after workflow completion"
            echo "Will use fallback build from branch source instead"
            echo "build_ready=false" >> "$GITHUB_OUTPUT"
            echo "use_fallback=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Successfully downloaded Liquibase Secure build after workflow completion"

          # Extract the liquibase Secure archive
          mkdir -p liquibase-build
          if [[ "$LIQUIBASE_SECURE_ZIP" == *.tar.gz ]]; then
            tar -xzf "$LIQUIBASE_SECURE_ZIP" -C liquibase-build/
            echo "Liquibase Secure build extracted from tar.gz to liquibase-build/"
          else
            unzip -q "$LIQUIBASE_SECURE_ZIP" -d liquibase-build/
            echo "Liquibase Secure build extracted from zip to liquibase-build/"
          fi
          echo "Contents of liquibase-build:"
          ls -la liquibase-build/
          echo "build_ready=true" >> "$GITHUB_OUTPUT"
          echo "use_fallback=false" >> "$GITHUB_OUTPUT"

      - name: Validate and prepare liquibase build
        if: ${{ (inputs.build_type == 'Community' && (steps.download-artifact.outputs.build_ready == 'true' || steps.download-artifact.outputs.use_fallback == 'true')) || inputs.build_type == 'secure' }}
        id: validate-build
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          DOWNLOAD_USE_FALLBACK: ${{ steps.download-artifact.outputs.use_fallback }}
          DOWNLOAD_AFTER_USE_FALLBACK: ${{ steps.download-after-trigger.outputs.use_fallback }}
          DOWNLOAD_TRIGGERED: ${{ steps.download-artifact.outputs.trigger_liquibase_secure_workflow }}
          TRIGGER_OUTCOME: ${{ steps.trigger-liquibase-secure-release.outcome }}
          DOWNLOAD_BUILD_READY: ${{ steps.download-artifact.outputs.build_ready }}
          DOWNLOAD_AFTER_BUILD_READY: ${{ steps.download-after-trigger.outputs.build_ready }}
        run: |
          # Determine build mode
          USE_FALLBACK="false"
          if [[ "$BUILD_TYPE" == "Community" && "$DOWNLOAD_USE_FALLBACK" == "true" ]]; then
            USE_FALLBACK="true"
          elif [[ "$BUILD_TYPE" == "secure" ]]; then
            # Check for Secure fallback conditions
            if [[ "$DOWNLOAD_USE_FALLBACK" == "true" ]] || [[ "$DOWNLOAD_AFTER_USE_FALLBACK" == "true" ]]; then
              USE_FALLBACK="true"
            # Check if Liquibase Secure workflow was triggered but failed
            elif [[ "$DOWNLOAD_TRIGGERED" == "true" ]] && [[ "$TRIGGER_OUTCOME" == "failure" ]]; then
              echo "Liquibase Secure workflow trigger failed, falling back to standard Dockerfile build"
              USE_FALLBACK="true"
            # Check if Liquibase Secure workflow succeeded but download still failed
            elif [[ "$DOWNLOAD_TRIGGERED" == "true" ]] && [[ "$DOWNLOAD_BUILD_READY" != "true" ]] && [[ "$DOWNLOAD_AFTER_BUILD_READY" != "true" ]]; then
              echo "Liquibase Secure workflow completed but build still not available, falling back to standard Dockerfile build"
              USE_FALLBACK="true"
            fi
          fi

          if [[ "$USE_FALLBACK" == "true" ]]; then
            echo "Using fallback mode - will build from standard Dockerfile using branch source"
            echo "use_fallback_build=true" >> "$GITHUB_OUTPUT"
          else
            # Validate the liquibase build structure
            if [ ! -f "liquibase-build/liquibase" ]; then
              echo "Error: liquibase executable not found in build"
              echo "Contents of liquibase-build:"
              find liquibase-build -type f
              exit 1
            fi

            # Make liquibase executable
            chmod +x liquibase-build/liquibase

            # Validate that liquibase can run
            cd liquibase-build && ./liquibase --version && cd ..

            echo "Liquibase build validation successful"
            echo "Final liquibase-build contents:"
            ls -la liquibase-build/
            echo "use_fallback_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Modify Dockerfiles for artifact-based build
        if: ${{ steps.validate-build.outputs.use_fallback_build == 'false' }}
        env:
          DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          echo "Modifying $DOCKERFILE_PATH to use downloaded artifact instead of GitHub releases..."

          # Create backup
          cp "$DOCKERFILE_PATH" "${DOCKERFILE_PATH}.backup"

          # Set version ARG based on dockerfile type
          if [[ "$DOCKERFILE_PATH" == "DockerfileSecure" ]]; then
            VERSION_ARG="LIQUIBASE_SECURE_VERSION"
          else
            VERSION_ARG="LIQUIBASE_VERSION"
          fi

          # Replace version ARG with branch name
          sed -i "s|ARG ${VERSION_ARG}=.*|ARG ${VERSION_ARG}=${BRANCH_NAME}|" "$DOCKERFILE_PATH"

          # Create modified Dockerfile using awk for cleaner handling
          cat "$DOCKERFILE_PATH" | awk -v dockerfile="$DOCKERFILE_PATH" -v branch="$BRANCH_NAME" '
          BEGIN {
            in_wget_block = 0
            skip_line = 0
          }

          # Skip SHA256 ARG lines
          /^ARG LB_SHA256=/ || /^ARG LB_SECURE_SHA256=/ { next }

          # Update version ARGs
          /^ARG LIQUIBASE_VERSION=/ { print "ARG LIQUIBASE_VERSION=" branch; next }
          /^ARG LIQUIBASE_SECURE_VERSION=/ { print "ARG LIQUIBASE_SECURE_VERSION=" branch; next }

          # Handle standard Dockerfile wget block
          dockerfile == "Dockerfile" && /^RUN wget.*github\.com.*liquibase.*tar\.gz/ {
            print "# Copy the extracted liquibase build from the build context"
            print "COPY liquibase-build/ ./"
            print ""
            print "RUN ln -s /liquibase/liquibase /usr/local/bin/liquibase && \\"
            print "    ln -s /liquibase/docker-entrypoint.sh /usr/local/bin/docker-entrypoint.sh && \\"
            print "    liquibase --version"
            in_wget_block = 1
            next
          }

          # Handle alpine Dockerfile wget block
          dockerfile == "Dockerfile.alpine" && /^RUN set -x/ {
            print "# Copy the extracted liquibase build from the build context"
            print "COPY liquibase-build/ ./"
            print ""
            print "RUN ln -s /liquibase/liquibase /usr/local/bin/liquibase && \\"
            print "    ln -s /liquibase/docker-entrypoint.sh /usr/local/bin/docker-entrypoint.sh && \\"
            print "    liquibase --version"
            in_wget_block = 1
            next
          }

          # Handle Secure Dockerfile wget block
          dockerfile == "DockerfileSecure" && /^RUN wget.*repo\.liquibase\.com.*tar\.gz/ {
            print "# Copy the extracted liquibase build from the build context"
            print "COPY liquibase-build/ ./"
            print ""
            print "RUN ln -s /liquibase/liquibase /usr/local/bin/liquibase && \\"
            print "    ln -s /liquibase/docker-entrypoint.sh /usr/local/bin/docker-entrypoint.sh && \\"
            print "    liquibase --version"
            in_wget_block = 1
            next
          }

          # Skip lines until we reach the end of wget block
          in_wget_block == 1 && /liquibase --version/ {
            in_wget_block = 0
            next
          }
          in_wget_block == 1 { next }

          # Print all other lines
          { print }
          ' > "${DOCKERFILE_PATH}.tmp"

          # Replace original with modified version
          mv "${DOCKERFILE_PATH}.tmp" "$DOCKERFILE_PATH"

          echo "Modified $DOCKERFILE_PATH"
          echo "=== Changes made ==="
          echo "- Set ${VERSION_ARG} to ${BRANCH_NAME}"
          echo "- Removed wget download commands"
          echo "- Removed SHA256 checksum validation"
          echo "- Added COPY liquibase-build/ ./"

          echo ""
          echo "=== Modified Dockerfile content preview ==="
          echo "First 30 lines of modified $DOCKERFILE_PATH:"
          head -30 "$DOCKERFILE_PATH"
          echo "..."

      - name: Compute image tag and build tag list
        id: image-tag
        env:
          IS_RC: ${{ inputs.is_rc }}
          SECURE_VERSION: ${{ inputs.secure_version }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          REPOSITORY: ${{ github.repository }}
          GIT_SHA: ${{ github.sha }}
          GHCR_NAME: ${{ inputs.ghcr_name }}
          PUSH_NEXUS: ${{ inputs.push_nexus }}
          PUSH_GHCR: ${{ inputs.push_ghcr }}
          REPO_URL: ${{ env.REPO_URL }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          if [[ "$IS_RC" == "true" && -n "$SECURE_VERSION" ]]; then
            IMAGE_TAG="$SECURE_VERSION"
          else
            IMAGE_TAG="$BRANCH_NAME"
          fi
          # Sanitize IMAGE_TAG for Docker tag safety (replace invalid chars with -)
          IMAGE_TAG=$(echo "$IMAGE_TAG" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          GHCR_REF="ghcr.io/${REPOSITORY}/liquibase-${GHCR_NAME}:${GIT_SHA}"
          echo "ghcr_ref=${GHCR_REF}" >> "$GITHUB_OUTPUT"

          # Build comma-separated tag list for build-push-action
          TAGS=""
          if [[ "$PUSH_NEXUS" == "true" ]]; then
            TAGS="${REPO_URL}/${IMAGE_NAME}:${IMAGE_TAG}"
          fi
          if [[ "$PUSH_GHCR" == "true" ]]; then
            if [[ -n "$TAGS" ]]; then TAGS="${TAGS},"; fi
            TAGS="${TAGS}${GHCR_REF}"
          fi
          if [[ -z "$TAGS" ]]; then
            echo "::error::Neither push_nexus nor push_ghcr is enabled; no push target is available."
            exit 1
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ steps.validate-build.outcome == 'success' }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set up QEMU
        if: ${{ steps.validate-build.outcome == 'success' }}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Log in to internal Nexus Docker Registry
        if: ${{ steps.validate-build.outcome == 'success' && inputs.push_nexus }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REPO_URL }}
          username: ${{ env.REPO_USER }}
          password: ${{ env.REPO_PASSWORD }}

      - name: Login to GHCR
        if: ${{ steps.validate-build.outcome == 'success' && inputs.push_ghcr }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ steps.validate-build.outcome == 'success' }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          platforms: ${{ inputs.platforms }}
          provenance: false
          tags: ${{ steps.image-tag.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/liquibase/docker
            org.opencontainers.image.description=Liquibase QA Container Image${{ inputs.suffix }}
            org.opencontainers.image.licenses=${{ inputs.build_type == 'secure' && 'LicenseRef-Liquibase-EULA' || 'FSL-1.1-ALv2' }}
            org.opencontainers.image.vendor=Liquibase
            org.opencontainers.image.version=${{ steps.image-tag.outputs.image_tag }}
            org.opencontainers.image.documentation=https://docs.liquibase.com
            org.opencontainers.image.revision=${{ github.sha }}
            liquibase.branch=${{ inputs.branch_name }}
            liquibase.build.mode=${{ steps.validate-build.outputs.use_fallback_build == 'true' && 'fallback' || 'artifact' }}

      - name: Image build summary
        if: ${{ steps.validate-build.outcome == 'success' }}
        env:
          USE_FALLBACK_BUILD: ${{ steps.validate-build.outputs.use_fallback_build }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
          REPO_URL: ${{ env.REPO_URL }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          if [[ "$USE_FALLBACK_BUILD" == "true" ]]; then
            BUILD_MODE="fallback (standard Dockerfile)"
          else
            BUILD_MODE="artifact-based"
          fi
          echo "Successfully built and pushed: ${REPO_URL}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Build mode: $BUILD_MODE"

      - name: Workflow execution summary
        if: always()
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
          DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
          BUILD_TYPE: ${{ inputs.build_type }}
          VALIDATE_USE_FALLBACK: ${{ steps.validate-build.outputs.use_fallback_build }}
          DOWNLOAD_USE_FALLBACK: ${{ steps.download-artifact.outputs.use_fallback }}
          DOWNLOAD_AFTER_USE_FALLBACK: ${{ steps.download-after-trigger.outputs.use_fallback }}
          DOWNLOAD_TRIGGERED: ${{ steps.download-artifact.outputs.trigger_liquibase_secure_workflow }}
          DOWNLOAD_AFTER_BUILD_READY: ${{ steps.download-after-trigger.outputs.build_ready }}
          JOB_STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
          REPO_URL: ${{ env.REPO_URL }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          echo "=== QA Docker Build Workflow Summary ==="
          echo "Branch: ${BRANCH_NAME}"
          echo "Dockerfile: ${DOCKERFILE_PATH}"
          echo "Build Type: ${BUILD_TYPE}"
          echo ""

          # Determine if fallback was used
          USE_FALLBACK="false"
          if [[ "$VALIDATE_USE_FALLBACK" == "true" ]] || [[ "$DOWNLOAD_USE_FALLBACK" == "true" ]] || [[ "$DOWNLOAD_AFTER_USE_FALLBACK" == "true" ]]; then
            USE_FALLBACK="true"
          fi

          if [[ "$USE_FALLBACK" == "true" ]]; then
            echo "Build Mode: FALLBACK (Standard Dockerfile from branch source)"
            echo "   - No pre-built artifacts were available"
            echo "   - Used standard Dockerfile without modification"
            echo "   - Built directly from liquibase branch: ${BRANCH_NAME}"
          elif [[ "$BUILD_TYPE" == "secure" ]]; then
            if [[ "$DOWNLOAD_TRIGGERED" == "true" ]]; then
              echo "Build Mode: ARTIFACT-BASED (Secure workflow triggered)"
              echo "   - S3 build was missing for branch ${BRANCH_NAME}"
              echo "   - Automatically triggered pro-release-to-s3.yml workflow"
              if [[ "$DOWNLOAD_AFTER_BUILD_READY" == "true" ]]; then
                echo "   - Liquibase-Secure workflow completed successfully"
                echo "   - Liquibase-Secure build downloaded and Docker image built"
              else
                echo "   - Liquibase-Secure workflow may have failed"
                echo "   - Check: https://github.com/liquibase/liquibase-pro/actions/workflows/secure-release-to-s3.yml"
              fi
            else
              echo "Build Mode: ARTIFACT-BASED (Direct S3 download)"
              echo "   - Liquibase-Secure build downloaded from S3"
            fi
          else
            echo "Build Mode: ARTIFACT-BASED (GitHub artifact)"
            echo "   - Community build downloaded from GitHub workflow artifacts"
          fi

          echo ""
          if [[ "$JOB_STATUS" == "success" ]]; then
            echo "Overall Status: SUCCESS"
            echo "Image Available: ${REPO_URL}/${IMAGE_NAME}:${IMAGE_TAG}"
            if [[ "$USE_FALLBACK" == "true" ]]; then
              echo "Built using fallback mode - standard Dockerfile from branch source"
            fi
          else
            echo "Overall Status: FAILED"
            echo "Check the logs above for detailed error information"
          fi
