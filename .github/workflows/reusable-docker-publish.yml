name: Reusable Docker Publish

on:
  workflow_call:
    inputs:
      release_type:
        description: 'liquibase-release or liquibase-secure-release'
        required: true
        type: string
      version:
        description: 'Version string, e.g. 5.0.1'
        required: true
        type: string
      tag_suffix:
        description: 'Release tag suffix: "" (community) or -SECURE'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'If true, skip release creation (validation mode)'
        required: false
        type: boolean
        default: false
      build_logic_ref:
        description: 'Ref for liquibase/build-logic checkout'
        required: false
        type: string
        default: 'main'

jobs:
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: write

    steps:
      - name: Validate release_type / tag_suffix consistency
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          TAG_SUFFIX: ${{ inputs.tag_suffix }}
        run: |
          if [[ "$RELEASE_TYPE" == "liquibase-release" ]]; then
            if [[ "$TAG_SUFFIX" != "" ]]; then
              echo "::error::release_type 'liquibase-release' requires an empty tag_suffix (got '${TAG_SUFFIX}'). Community releases must not carry a suffix."
              exit 1
            fi
          elif [[ "$RELEASE_TYPE" == "liquibase-secure-release" ]]; then
            if [[ "$TAG_SUFFIX" != "-SECURE" ]]; then
              echo "::error::release_type 'liquibase-secure-release' requires tag_suffix '-SECURE' (got '${TAG_SUFFIX}'). Publishing a Secure release without the suffix would create a conflicting community tag."
              exit 1
            fi
          else
            echo "::error::Unknown release_type '${RELEASE_TYPE}'. Must be 'liquibase-release' or 'liquibase-secure-release'."
            exit 1
          fi

      - name: Determine Release Tag
        id: release-tag
        env:
          VERSION: ${{ inputs.version }}
          TAG_SUFFIX: ${{ inputs.tag_suffix }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          TAG_NAME="v${VERSION}${TAG_SUFFIX}"
          if [[ "$RELEASE_TYPE" == "liquibase-secure-release" ]]; then
            RELEASE_NAME="v${VERSION} SECURE"
          else
            RELEASE_NAME="v${VERSION}"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "::notice::Publishing GitHub release for ${RELEASE_TYPE} on tag: ${TAG_NAME}"

      - name: Get Release Notes from Release Drafter Draft
        id: get-release-notes
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          TARGET_TAG: ${{ steps.release-tag.outputs.tag_name }}
        with:
          script: |
            const isSecure = process.env.RELEASE_TYPE === 'liquibase-secure-release';
            const targetTag = process.env.TARGET_TAG;

            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // Find the matching draft from Release Drafter whose tag exactly matches the target tag
            const draft = releases.data.find(r => {
              if (!r.draft) return false;
              if (r.tag_name !== targetTag) return false;
              return isSecure ? r.tag_name.includes('SECURE') : !r.tag_name.includes('SECURE');
            });

            if (draft) {
              // Delete the draft regardless of body content — we'll create the real release
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draft.id
              });
              core.info(`Deleted Release Drafter draft: ${draft.name}`);

              if (draft.body) {
                core.setOutput('body', draft.body);
                core.setOutput('found', 'true');
              } else {
                core.setOutput('found', 'false');
                core.info('Draft had empty body, using default release notes');
              }
            } else {
              core.setOutput('found', 'false');
              core.info('No Release Drafter draft found, using default release notes');
            }

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: ${{ steps.release-tag.outputs.release_name }}
          tag_name: ${{ steps.release-tag.outputs.tag_name }}
          draft: true
          body: |
            ${{ inputs.release_type == 'liquibase-secure-release' && format('Support for Liquibase Secure {0}.', inputs.version) || format('Support for Liquibase {0}.', inputs.version) }}

            ${{ steps.get-release-notes.outputs.found == 'true' && steps.get-release-notes.outputs.body || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release (draft=false, latest=true)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          TAG="${RELEASE_TAG}"
          if ! gh release view "${TAG}" --repo "${REPOSITORY}" &>/dev/null; then
            echo "::warning::Release '${TAG}' not found — skipping publish."
            exit 0
          fi
          gh release edit "${TAG}" \
            --repo "${REPOSITORY}" \
            --draft=false \
            --latest=true
          echo "Release ${TAG} published successfully"
