name: Reusable Docker Scan

on:
  workflow_call:
    inputs:
      dockerfile_path:
        description: 'Dockerfile for the image to scan'
        required: true
        type: string
      image_name:
        description: 'Image base name, e.g. liquibase/liquibase or liquibase/liquibase-secure'
        required: true
        type: string
      suffix:
        description: 'Image suffix, e.g. "" or -alpine'
        required: false
        type: string
        default: ''
      ghcr_tag:
        description: 'GHCR tag used for the scan target; defaults to github.sha when empty'
        required: false
        type: string
        default: ''
      vex_enabled:
        description: 'Enable VEX passthrough to reusable-vulnerability-scan.yml (Secure ONLY)'
        required: false
        type: boolean
        default: false
      upload_sarif:
        description: 'Upload Trivy SARIF results to GitHub Security tab'
        required: false
        type: boolean
        default: true
      dispatch_new_cves:
        description: 'Pass through to reusable-vulnerability-scan.yml for CVE dispatch. Defaults to false; secure-image callers must opt in explicitly.'
        required: false
        type: boolean
        default: false
      scout_enabled:
        description: 'Run Docker Scout job'
        required: false
        type: boolean
        default: true
      build_context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      build_logic_ref:
        description: 'Ref for liquibase/build-logic and nested reusable call'
        required: false
        type: string
        default: 'main'
      slack_webhook_env_var:
        description: 'Vault env-var name holding the Slack webhook URL for failure alerts. Defaults to #docker-builds. Pass an empty string to disable notifications.'
        required: false
        type: string
        default: 'DOCKER_SLACK_WEBHOOK_URL'
    outputs:
      scan_status:
        description: 'pass or fail based on vulnerability thresholds'
        value: ${{ jobs.vulnerability-scan.outputs.scan_status }}
      total_vulnerabilities:
        description: 'Count reported by Trivy'
        value: ${{ jobs.vulnerability-scan.outputs.total_vulnerabilities }}

jobs:
  # ============================================
  # BUILD AND PUSH TO GHCR FOR SCANNING
  # ============================================
  build-ghcr:
    name: Build and push to GHCR
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      packages: write
    outputs:
      ghcr_image: ${{ steps.set-ghcr-ref.outputs.ghcr_image }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive GHCR image name
        id: set-ghcr-ref
        env:
          SUFFIX: ${{ inputs.suffix }}
          IMAGE_NAME: ${{ inputs.image_name }}
          GHCR_TAG: ${{ inputs.ghcr_tag || github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Sanitize suffix for use in image tag (strip leading dash)
          SAFE_SUFFIX=$(echo "$SUFFIX" | sed 's/^-//')
          if [[ -n "$SAFE_SUFFIX" ]]; then
            GHCR_NAME="${SAFE_SUFFIX}"
          else
            # Use last segment of image_name as discriminator (e.g. liquibase-secure)
            GHCR_NAME=$(echo "$IMAGE_NAME" | awk -F'/' '{print $NF}')
          fi
          GHCR_IMAGE="ghcr.io/${REPOSITORY}/liquibase-${GHCR_NAME}:${GHCR_TAG}"
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "GHCR target: ${GHCR_IMAGE}"

      - name: Build and push to GHCR
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.set-ghcr-ref.outputs.ghcr_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # VULNERABILITY SCAN (REUSABLE WORKFLOW)
  # ============================================
  vulnerability-scan:
    needs: build-ghcr
    name: Trivy Scan ${{ inputs.image_name }}${{ inputs.suffix }}
    uses: liquibase/build-logic/.github/workflows/reusable-vulnerability-scan.yml@main
    with:
      mode: docker
      source: ${{ needs.build-ghcr.outputs.ghcr_image }}
      image_name: ${{ inputs.image_name }}
      image_tag: ${{ inputs.suffix != '' && inputs.suffix || 'latest' }}
      fail_on_vulnerabilities: true
      upload_sarif: ${{ inputs.upload_sarif }}
      sarif_category: ${{ inputs.image_name }}${{ inputs.suffix }}
      generate_sbom: true
      vex_enabled: ${{ inputs.vex_enabled }}
      build_logic_ref: ${{ inputs.build_logic_ref }}
      dispatch_new_cves: ${{ inputs.dispatch_new_cves }}
      nested: true  # suppress the nested scheduled auto-notify; this (outer) scan owns the alert (D4)
    secrets: inherit

  # ============================================
  # DOCKER SCOUT
  # ============================================
  scout:
    needs: build-ghcr
    if: inputs.scout_enabled
    name: Docker Scout ${{ inputs.image_name }}${{ inputs.suffix }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      packages: read
      security-events: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build ${{ inputs.image_name }}${{ inputs.suffix }} from Dockerfile
        env:
          DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
          BUILD_CONTEXT: ${{ inputs.build_context }}
          IMAGE_NAME: ${{ inputs.image_name }}
          SUFFIX: ${{ inputs.suffix }}
          GHCR_TAG: ${{ inputs.ghcr_tag || github.sha }}
        run: |
          docker build -f "$DOCKERFILE_PATH" \
            -t "${IMAGE_NAME}${SUFFIX}:${GHCR_TAG}" "$BUILD_CONTEXT"

      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Decode DOCKERHUB_USERNAME
        env:
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
        run: |
          decoded_username=$(echo "$DOCKERHUB_USERNAME" | base64 -d | tr -d '\r\n')
          echo "DOCKERHUB_USERNAME_DECODED=$decoded_username" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME_DECODED }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Install Docker Scout CLI (pinned)
        env:
          # v1.23.1+ is required: it discards the empty VEX document the Scout
          # platform serves for org-scoped scans instead of panicking on it
          # (TECHOPS-630, docker/scout-cli#231).
          SCOUT_VERSION: v1.23.1
        run: |
          # Install the Scout CLI plugin directly instead of via docker/scout-action.
          # The action downloads its binary UNAUTHENTICATED from the api.github.com
          # release-asset API, which is rate-limited to 60 req/hr per shared runner
          # egress IP and returns HTTP 403 once exhausted (TECHOPS-661). The official
          # install.sh fetches from the github.com browser-download path
          # (objects.githubusercontent.com) and resolves the pinned tag via github.com
          # — never api.github.com — so it does not consume that limit. Pinning the
          # version also skips install.sh's `latest` redirect lookup.
          curl -sSfL "https://raw.githubusercontent.com/docker/scout-cli/${SCOUT_VERSION}/install.sh" \
            | sh -s -- "${SCOUT_VERSION}"
          docker scout version

      - name: Download VEX files for Scout
        if: inputs.vex_enabled
        run: |
          # Mirror the full liquibase/vex-repo tree so Scout sees one VEX
          # statement set per transitive package. Trivy auto-discovers via
          # ~/.trivy/vex/repository.yaml in reusable-vulnerability-scan.yml,
          # but Scout's --vex-location only reads files in the directory it is
          # pointed at, so we flatten every pkg/**/vex.openvex.json into ./vex/.
          mkdir -p ./vex
          git clone --depth 1 https://github.com/liquibase/vex-repo /tmp/vex-repo

          count=0
          while IFS= read -r f; do
            rel="${f#/tmp/vex-repo/}"
            flat="${rel//\//-}"
            cp "$f" "./vex/$flat"
            count=$((count + 1))
          done < <(find /tmp/vex-repo/pkg -type f -name 'vex.openvex.json')

          total=$(find ./vex -type f -name '*.json' -exec jq '.statements | length' {} \; \
            | awk '{s+=$1} END{print s+0}')
          echo "VEX files copied to ./vex/: $count file(s), $total total statement(s)"

      # Replaces docker/scout-action (TECHOPS-661): invoke the Scout CLI directly so
      # the binary used is the one installed above (browser-download path), never the
      # action's unauthenticated api.github.com download that 403s. continue-on-error
      # keeps a Scout 403 from hard-failing CI; Trivy (vulnerability-scan job) is
      # the gating scanner. (The TECHOPS-630 server-side VEX panic is fixed by the
      # v1.23.1 pin above.) Dropped vs the action: write-comment (PR comment) and the
      # GitHub step summary, which have no `docker scout cves` CLI equivalent.
      - name: Docker Scout (SARIF)
        continue-on-error: true
        env:
          VEX_ENABLED: ${{ inputs.vex_enabled }}
          IMAGE_NAME: ${{ inputs.image_name }}
          SUFFIX: ${{ inputs.suffix }}
          GHCR_TAG: ${{ inputs.ghcr_tag || github.sha }}
        run: |
          SCOUT_ARGS=(
            --format sarif
            --output scout-results.sarif
            --only-severity critical,high
            --exit-code
          )
          if [[ "$VEX_ENABLED" == "true" ]]; then
            SCOUT_ARGS+=(--vex-location ./vex --only-vex-affected --vex-author "Liquibase Security Team")
          fi
          docker scout cves "${SCOUT_ARGS[@]}" \
            "${IMAGE_NAME}${SUFFIX}:${GHCR_TAG}"

      - name: Docker Scout JSON output
        if: always()
        env:
          VEX_ENABLED: ${{ inputs.vex_enabled }}
          IMAGE_NAME: ${{ inputs.image_name }}
          SUFFIX: ${{ inputs.suffix }}
          GHCR_TAG: ${{ inputs.ghcr_tag || github.sha }}
        run: |
          SCOUT_ARGS=(
            --format json
            --output scout-results.json
            --only-severity critical,high
          )
          if [[ "$VEX_ENABLED" == "true" ]]; then
            SCOUT_ARGS+=(--vex-location ./vex --only-vex-affected --vex-author "Liquibase Security Team")
          fi
          docker scout cves "${SCOUT_ARGS[@]}" \
            "${IMAGE_NAME}${SUFFIX}:${GHCR_TAG}" || true

      - name: Upload Scout JSON results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scout-results${{ inputs.vex_enabled && '-secure' || inputs.suffix }}
          path: scout-results.json
          if-no-files-found: warn

      - name: Upload Scout scan results to GitHub Security tab
        if: ${{ always() && hashFiles('scout-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: "scout-results.sarif"
          category: "${{ inputs.image_name }}${{ inputs.suffix }}"

  # ============================================
  # CLEANUP GHCR IMAGES (always runs)
  # ============================================
  cleanup-ghcr:
    needs: [build-ghcr, vulnerability-scan]
    if: always()
    name: Cleanup GHCR ${{ inputs.image_name }}${{ inputs.suffix }}
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete GHCR image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_IMAGE: ${{ needs.build-ghcr.outputs.ghcr_image }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # Parse org, package name and tag from the full image ref
          # ghcr.io/<org>/<repo>/<pkg>:<tag>
          # Extract package sub-path from ghcr_image: everything after "ghcr.io/<org>/"
          PKG_WITH_TAG="${GHCR_IMAGE#ghcr.io/${REPO_OWNER}/}"
          PACKAGE_NAME="${PKG_WITH_TAG%%:*}"
          TAG="${PKG_WITH_TAG##*:}"
          # Pass PACKAGE_NAME via sys.argv to avoid shell interpolation into Python
          ENCODED_PACKAGE_NAME=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=''))" "$PACKAGE_NAME")

          VERSION_ID=$(gh api \
            "/orgs/${REPO_OWNER}/packages/container/${ENCODED_PACKAGE_NAME}/versions" \
            --jq --arg tag "$TAG" '.[] | select(.metadata.container.tags[] == $tag) | .id' 2>/dev/null || echo "")
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE \
              "/orgs/${REPO_OWNER}/packages/container/${ENCODED_PACKAGE_NAME}/versions/${VERSION_ID}"
            echo "Deleted ${PACKAGE_NAME}:${TAG}"
          else
            echo "No version found for ${PACKAGE_NAME}:${TAG}, skipping"
          fi

  # ============================================
  # SLACK FAILURE NOTIFICATION
  # Outermost owner for scan alerts — covers build-ghcr, vulnerability-scan,
  # scout, and cleanup-ghcr. Uses always() to fire even when scout is skipped
  # (scout_enabled=false). The nested reusable-vulnerability-scan call passes
  # nested:true above, so its scheduled auto-notify is suppressed and THIS job
  # owns the alert (no double-post, D4).
  # ============================================
  notify:
    needs: [build-ghcr, vulnerability-scan, scout, cleanup-ghcr]
    if: ${{ always() && contains(needs.*.result, 'failure') && inputs.slack_webhook_env_var != '' }}
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Resolve Slack webhook
        id: webhook
        env:
          WEBHOOK_ENV_VAR: ${{ inputs.slack_webhook_env_var }}
        run: |
          # The var name is caller-controlled: validate name and value shape, and pass the
          # webhook as a step output (random-delimiter heredoc) — never into GITHUB_ENV.
          if ! printf '%s' "$WEBHOOK_ENV_VAR" | grep -qE '^[A-Z][A-Z0-9_]{0,127}$'; then
            echo "::error::Invalid slack_webhook_env_var name: $WEBHOOK_ENV_VAR"
            exit 1
          fi
          WEBHOOK_VALUE="${!WEBHOOK_ENV_VAR}"
          if [ -z "$WEBHOOK_VALUE" ]; then
            echo "::error::Slack webhook env $WEBHOOK_ENV_VAR resolved empty — check /vault/liquibase contains this key"
            exit 1
          fi
          if ! printf '%s' "$WEBHOOK_VALUE" | grep -qE '^https://hooks\.slack\.com/[A-Za-z0-9/_+-]+$'; then
            echo "::error::$WEBHOOK_ENV_VAR does not look like a Slack webhook URL"
            exit 1
          fi
          DELIM="WEBHOOK_EOF_${RANDOM}${RANDOM}"
          {
            echo "url<<$DELIM"
            echo "$WEBHOOK_VALUE"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
        env:
          SLACK_WEBHOOK: ${{ steps.webhook.outputs.url }}
          SLACK_COLOR: failure
          SLACK_TITLE: "❌ ${{ github.repository }} ❌ Docker scan failed on ${{ github.ref_name }} (${{ github.sha }})"
          SLACK_MESSAGE: "View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SLACK_USERNAME: liquibot
          SLACK_ICON_EMOJI: ":whale:"
          SLACK_FOOTER: "${{ github.repository }}"
          SLACK_LINK_NAMES: true
