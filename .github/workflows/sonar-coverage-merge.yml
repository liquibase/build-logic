name: SonarCloud Coverage Merge

on:
  workflow_call:
    inputs:
      testedClassesModuleName:
        description: "Module containing tested classes (or 'root' for root module)"
        type: string
        default: "root"
      liquibaseBranchName:
        description: "Liquibase branch name for snapshot resolution"
        type: string
        default: ""
      mavenArgs:
        description: "Extra Maven arguments for sonar scan"
        type: string
        default: "-Dsonar.coverage.exclusions=**/test/**/*.*,**/pom.xml"

jobs:
  sonar:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.event.after }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Configure Maven settings
        uses: whelk-io/maven-settings-xml-action@9dc09b23833fa9aa7f27b63db287951856f3433d # v22
        with:
          repositories: |
            [
              {
                "id": "liquibase",
                "url": "https://maven.pkg.github.com/liquibase/liquibase",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true", "updatePolicy": "always" }
              },
              {
                "id": "liquibase-pro",
                "url": "https://maven.pkg.github.com/liquibase/liquibase-pro",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true", "updatePolicy": "always" }
              }
            ]
          servers: |
            [
              {
                "id": "liquibase-pro",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              },
              {
                "id": "liquibase",
                "username": "liquibot",
                "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"
              }
            ]

      - name: Download unit test coverage
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: liquibase-jacoco-test-results
          path: coverage/unit

      - name: Download integration test coverage
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: liquibase-integration-jacoco-test-results-*
          path: coverage/integration/
          merge-multiple: false

      - name: Cache SonarCloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build classes for Sonar
        env:
          LIQUIBASE_BRANCH: ${{ inputs.liquibaseBranchName }}
        run: |
          VERSION_FLAG=""
          if [ -n "$LIQUIBASE_BRANCH" ]; then
            VERSION_FLAG="-Dliquibase.version=${LIQUIBASE_BRANCH}-SNAPSHOT"
          fi
          mvn -B clean install -DskipTests -P 'sonar,!run-proguard' $VERSION_FLAG

      - name: Merge coverage reports
        env:
          TESTED_MODULE: ${{ inputs.testedClassesModuleName }}
        run: |
          mkdir -p target

          # Collect all jacoco.exec files with unique names
          i=0
          for f in $(find coverage -name "jacoco.exec"); do
            cp "$f" "target/jacoco-${i}.exec"
            i=$((i+1))
          done

          if [ "$i" -eq 0 ]; then
            echo "No coverage files found"
            exit 1
          fi

          echo "Found $i coverage files"

          # Download JaCoCo CLI and verify checksum
          wget -q https://github.com/jacoco/jacoco/releases/download/v0.8.12/jacoco-0.8.12.zip
          echo "35cf2a2b8937659ecbc8d0d3902dfa7f55b7ed2250e82424036a3e1d12462cd7  jacoco-0.8.12.zip" | sha256sum -c -
          unzip -qq jacoco-0.8.12.zip -d jacoco-cli

          # Merge all exec files
          java -jar jacoco-cli/lib/jacococli.jar merge target/jacoco-*.exec --destfile target/merged.exec

          # Generate XML report
          if [ "$TESTED_MODULE" = "root" ]; then
            CLASSFILES="target/classes"
            SOURCEFILES="src"
          else
            CLASSFILES="${TESTED_MODULE}/target/classes"
            SOURCEFILES="${TESTED_MODULE}/src"
          fi

          java -jar jacoco-cli/lib/jacococli.jar report target/merged.exec \
            --classfiles "$CLASSFILES" \
            --sourcefiles "$SOURCEFILES" \
            --xml target/jacoco.xml

      - name: Sonar scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          SCM_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          MAVEN_ARGS: ${{ inputs.mavenArgs }}
          LIQUIBASE_BRANCH: ${{ inputs.liquibaseBranchName }}
        run: |
          SONAR_ARGS=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            SONAR_ARGS="-Dsonar.pullrequest.key=$PR_NUMBER"
            SONAR_ARGS="$SONAR_ARGS -Dsonar.pullrequest.branch=$PR_HEAD_REF"
            SONAR_ARGS="$SONAR_ARGS -Dsonar.pullrequest.base=$PR_BASE_REF"
          else
            SONAR_ARGS="-Dsonar.branch.name=$REF_NAME"
          fi

          VERSION_FLAG=""
          if [ -n "$LIQUIBASE_BRANCH" ]; then
            VERSION_FLAG="-Dliquibase.version=${LIQUIBASE_BRANCH}-SNAPSHOT"
          fi

          mvn -B sonar:sonar -P 'sonar,!run-proguard' -DskipTests \
            $VERSION_FLAG \
            $MAVEN_ARGS \
            -Dsonar.scm.revision=$SCM_REVISION \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.java.coveragePlugin=jacoco \
            $SONAR_ARGS \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.organization=$REPO_OWNER \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.scm.provider=git \
            -Daws.region=us-east-1
