name: "Test Composite Action (DAT-22608)"

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository to test (e.g., liquibase-nochangeloglock)"
        required: true
        default: "liquibase-nochangeloglock"
      version:
        description: "Published release version (e.g., 5.0.2)"
        required: true
        default: "5.0.2"

permissions:
  contents: read
  id-token: write

jobs:
  test-publish:
    runs-on: ubuntu-latest
    name: "Test Central Portal publish"
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Checkout build-logic
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.repository }}

      - name: Download Release Artifacts
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
          REPOSITORY: ${{ inputs.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p artifacts
          gh release download "v$VERSION" \
            --repo "liquibase/$REPOSITORY" \
            --pattern "*.jar" --pattern "*.pom" \
            --pattern "*.asc" \
            --dir artifacts
          echo "Downloaded artifacts:"
          ls -la artifacts/

      - name: Publish to Central Portal
        uses: ./.github/actions/publish-to-central-portal
        id: publish
        with:
          artifacts-dir: artifacts
          version: ${{ inputs.version }}
          sonatype-username: ${{ env.SONATYPE_USERNAME }}
          sonatype-token: ${{ env.SONATYPE_TOKEN }}

      - name: Show deployment result
        run: |
          echo "Deployment ID: ${{ steps.publish.outputs.deployment-id }}"
          echo "Review at: https://central.sonatype.com/publishing/deployments"
